<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幸福家房產 - 獎金管理系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: 僅使用非襯線體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #F8F6F1; /* 莫蘭迪米色 */
            --primary: #8DA08A; /* 莫蘭迪草本綠 */
            --secondary: #E3E7D3;
            --text: #4A5A50; /* 深板岩色 */
            --accent: #9A8C98; /* 莫蘭迪紫灰 */
            --danger: #B5838D;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        /* 移除所有斜體與襯線體設定 */
        .font-sans { font-family: 'Noto Sans TC', sans-serif; }
        
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .morandi-card {
            background: white;
            border: 1px solid var(--secondary);
            border-radius: 1.25rem;
            transition: all 0.3s ease;
            overflow: hidden;
            word-wrap: break-word;
            word-break: break-all;
        }
        .morandi-card:hover {
            border-color: var(--primary);
            box-shadow: 0 8px 20px -5px rgba(141, 160, 138, 0.15);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            transition: all 0.2s;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid white;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 響應式優化：確保不超出畫面 */
        .container-main {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
    </style>
</head>
<body>

    <!-- 登入介面 -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white p-10 rounded-[2rem] shadow-sm border border-secondary text-center fade-in">
            <h1 class="text-2xl font-bold mb-2 tracking-tight">幸福家代銷部</h1>
            <p class="text-accent mb-8 text-xs tracking-[0.2em] font-light uppercase">Bonus Management System</p>
            
            <div class="space-y-4">
                <button id="btn-login" class="btn-primary w-full py-4 rounded-2xl flex items-center justify-center gap-3 font-medium shadow-sm">
                    <i data-lucide="log-in" id="login-icon" class="w-5 h-5"></i>
                    <div id="login-spinner" class="spinner hidden"></div>
                    <span id="login-text">使用 Google 帳號登入</span>
                </button>
                <p class="text-[10px] text-gray-400">系統僅供內部授權人員使用</p>
            </div>
            
            <div id="error-container" class="mt-6 p-4 bg-red-50 border border-red-100 rounded-2xl hidden text-left fade-in">
                <div class="flex gap-2 text-red-600 mb-1">
                    <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
                    <span class="text-xs font-bold">登入受限</span>
                </div>
                <p id="error-message" class="text-[11px] text-red-500 leading-relaxed">
                    此網域尚未授權，請聯繫管理員或點擊下方嘗試。
                </p>
                <div class="mt-4 pt-3 border-t border-red-100 flex flex-col gap-2">
                    <button id="btn-guest-access" class="text-[10px] bg-white border border-red-200 py-2 rounded text-red-600 hover:bg-red-50 transition-colors">使用臨時授權進入</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 主應用程式介面 -->
    <div id="app-screen" class="hidden min-h-screen">
        <nav class="fixed top-0 left-0 right-0 h-16 bg-white/80 backdrop-blur-md border-b border-secondary flex items-center justify-between px-6 z-50">
            <div class="flex items-center gap-2">
                <i data-lucide="layout-grid" class="text-primary w-5 h-5"></i>
                <span class="font-bold text-base tracking-tighter">BONUS ADMIN</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="user-email" class="hidden md:block text-[11px] text-accent font-medium"></span>
                <button id="btn-logout" class="p-2 hover:bg-gray-100 rounded-full transition-colors">
                    <i data-lucide="log-out" class="w-5 h-5 text-accent"></i>
                </button>
            </div>
        </nav>

        <main class="pt-24 pb-12 container-main">
            <div id="admin-nav" class="hidden flex gap-2 mb-8 overflow-x-auto no-scrollbar pb-2">
                <button onclick="showPage('dashboard')" id="tab-dashboard" class="whitespace-nowrap px-6 py-2 rounded-full bg-primary text-white text-xs font-medium shadow-sm">個人獎金</button>
                <button onclick="showPage('admin')" id="tab-admin" class="whitespace-nowrap px-6 py-2 rounded-full bg-white border border-secondary text-accent text-xs hover:border-primary transition-all">管理中心</button>
            </div>

            <!-- 分頁：個人儀表板 -->
            <div id="page-dashboard" class="space-y-6 fade-in">
                <header>
                    <h2 class="text-xl font-bold">您好，<span id="display-name" class="text-primary">...</span></h2>
                    <p class="text-[10px] text-accent mt-1 tracking-wider uppercase">Real-time Bonus Statistics</p>
                </header>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="morandi-card p-6">
                        <div class="text-[10px] text-accent mb-2 font-bold uppercase tracking-widest">應領總額</div>
                        <div class="text-2xl font-bold tracking-tight" id="val-total">NT$ 0</div>
                    </div>
                    <div class="morandi-card p-6">
                        <div class="text-[10px] text-primary mb-2 font-bold uppercase tracking-widest">已領取</div>
                        <div class="text-2xl font-bold tracking-tight text-primary" id="val-received">NT$ 0</div>
                    </div>
                    <div class="morandi-card p-6">
                        <div class="text-[10px] text-danger mb-2 font-bold uppercase tracking-widest">待領取</div>
                        <div class="text-2xl font-bold tracking-tight text-danger" id="val-pending">NT$ 0</div>
                    </div>
                </div>

                <section>
                    <h3 class="text-sm font-bold mb-4 flex items-center gap-2">
                        <i data-lucide="bar-chart-3" class="w-4 h-4 text-primary"></i> 案場獎金明細
                    </h3>
                    <div id="project-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="col-span-full py-12 text-center text-gray-300 text-xs tracking-widest uppercase">No Data Available</div>
                    </div>
                </section>
            </div>

            <!-- 分頁：管理介面 -->
            <div id="page-admin" class="hidden space-y-8 fade-in">
                <header>
                    <h2 class="text-xl font-bold">系統管理中心</h2>
                    <p class="text-[10px] text-accent mt-1 uppercase tracking-wider">Database & Authorization</p>
                </header>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <!-- 上傳區 -->
                    <div class="bg-white p-6 rounded-[1.5rem] border border-secondary">
                        <h3 class="text-xs font-bold mb-4 flex items-center gap-2">
                            <i data-lucide="file-up" class="w-4 h-4"></i> 1. 匯入獎金 CSV 檔案
                        </h3>
                        <div id="drop-zone" class="border-2 border-dashed border-secondary rounded-2xl p-8 text-center hover:border-primary transition-all relative bg-gray-50/50">
                            <input type="file" id="csv-file" accept=".csv" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                            <div id="upload-status" class="flex flex-col items-center">
                                <i data-lucide="upload-cloud" class="mx-auto w-8 h-8 text-gray-300 mb-2"></i>
                                <p class="text-[11px] text-accent">點擊或拖放檔案</p>
                                <p class="text-[9px] text-gray-400 mt-2">格式：發放日期, 姓名, 職位...獎金合計, 案別</p>
                            </div>
                        </div>
                    </div>

                    <!-- 授權區 -->
                    <div class="bg-white p-6 rounded-[1.5rem] border border-secondary">
                        <h3 class="text-xs font-bold mb-4 flex items-center gap-2">
                            <i data-lucide="shield-check" class="w-4 h-4"></i> 2. 人員授權管理
                        </h3>
                        <form id="form-auth" class="space-y-3 mb-6">
                            <div class="flex flex-col sm:flex-row gap-2">
                                <input id="auth-name" placeholder="人員姓名" required class="flex-1 px-4 py-2 bg-gray-50 rounded-xl text-xs outline-none focus:ring-1 focus:ring-primary" />
                                <input id="auth-email" type="email" placeholder="Gmail 地址" required class="flex-1 px-4 py-2 bg-gray-50 rounded-xl text-xs outline-none focus:ring-1 focus:ring-primary" />
                            </div>
                            <button type="submit" class="w-full py-2 btn-primary rounded-xl text-xs font-medium">新增授權</button>
                        </form>
                        <div id="auth-list" class="space-y-2 max-h-48 overflow-y-auto pr-1"></div>
                    </div>
                </div>
                
                <div class="pt-8 flex justify-end">
                    <button id="btn-clear-data" class="text-[10px] text-danger/60 hover:text-danger flex items-center gap-1 transition-colors">
                        <i data-lucide="trash-2" class="w-3 h-3"></i> 清空資料庫所有獎金紀錄
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, writeBatch, onSnapshot, doc, addDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDREvduzrja4xjF-RCpKa-qv45JZCw9tjI",
            authDomain: "gen-lang-client-0168131217.firebaseapp.com",
            projectId: "gen-lang-client-0168131217",
            storageBucket: "gen-lang-client-0168131217.firebasestorage.app",
            messagingSenderId: "620488371764",
            appId: "1:620488371764:web:77fe6caab7ce0652ab2461"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'bonus-system-pro';
        const ADMIN_EMAIL = 'jingchuantw@gmail.com';

        let currentUser = null;
        let mappingData = {};
        let bonusData = [];

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email || "臨時訪客";
                if (user.email === ADMIN_EMAIL || user.isAnonymous) {
                    document.getElementById('admin-nav').classList.remove('hidden');
                }
                startSync();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
            lucide.createIcons();
        });

        document.getElementById('btn-login').onclick = async () => {
            const btn = document.getElementById('btn-login');
            btn.disabled = true;
            document.getElementById('login-icon').classList.add('hidden');
            document.getElementById('login-spinner').classList.remove('hidden');
            
            try {
                await signInWithPopup(auth, new GoogleAuthProvider());
            } catch (err) {
                console.error(err);
                document.getElementById('error-container').classList.remove('hidden');
                btn.disabled = false;
                document.getElementById('login-icon').classList.remove('hidden');
                document.getElementById('login-spinner').classList.add('hidden');
            }
        };

        document.getElementById('btn-guest-access').onclick = () => signInAnonymously(auth);
        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());

        function startSync() {
            // 同步授權名單
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'mappings'), (snap) => {
                mappingData = {};
                const list = document.getElementById('auth-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const data = d.data();
                    mappingData[data.email.toLowerCase().trim()] = data.name;
                    const el = document.createElement('div');
                    el.className = "flex justify-between items-center p-3 bg-gray-50 rounded-xl text-[10px] border border-secondary/50";
                    el.innerHTML = `<span><b>${data.name}</b> · ${data.email}</span>`;
                    list.appendChild(el);
                });
                renderUI();
            });

            // 同步獎金資料
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'bonuses'), (snap) => {
                bonusData = [];
                snap.forEach(d => bonusData.push({ id: d.id, ...d.data() }));
                renderUI();
            });
        }

        function renderUI() {
            if (!currentUser) return;
            const myName = (currentUser.email === ADMIN_EMAIL || currentUser.isAnonymous) 
                ? "管理員" 
                : (mappingData[currentUser.email?.toLowerCase().trim()] || null);

            document.getElementById('display-name').innerText = myName || "未授權人員";
            
            // 篩選數據：管理員看全部，員工看自己
            const filtered = (myName === "管理員") ? bonusData : bonusData.filter(b => b.name === myName);
            
            let total = 0, received = 0, pending = 0;
            const byProject = {};

            filtered.forEach(b => {
                const amt = parseFloat(b.amount) || 0;
                total += amt;
                if (b.status === '已領') received += amt; else pending += amt;
                if (!byProject[b.project]) byProject[b.project] = 0;
                byProject[b.project] += amt;
            });

            document.getElementById('val-total').innerText = `NT$ ${total.toLocaleString()}`;
            document.getElementById('val-received').innerText = `NT$ ${received.toLocaleString()}`;
            document.getElementById('val-pending').innerText = `NT$ ${pending.toLocaleString()}`;

            const list = document.getElementById('project-list');
            list.innerHTML = '';
            Object.entries(byProject).forEach(([name, amt]) => {
                const card = document.createElement('div');
                card.className = "morandi-card p-5 flex justify-between items-center";
                card.innerHTML = `
                    <div>
                        <div class="text-[9px] text-accent font-bold uppercase tracking-tighter">Project</div>
                        <div class="text-xs font-bold">${name}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[9px] text-accent font-bold uppercase tracking-tighter">Subtotal</div>
                        <div class="text-lg font-bold text-primary">NT$ ${amt.toLocaleString()}</div>
                    </div>`;
                list.appendChild(card);
            });
            
            if (filtered.length === 0) list.innerHTML = `<div class="col-span-full py-12 text-center text-gray-300 text-[10px] tracking-widest uppercase">No Bonus Records Found</div>`;
            lucide.createIcons();
        }

        // --- 優化後的 CSV 解析器 ---
        async function processFile(file) {
            if (!file) return;
            const statusEl = document.getElementById('upload-status');
            statusEl.innerHTML = `<div class="spinner border-gray-300 border-t-primary w-6 h-6 mb-2"></div><p class="text-[9px] text-primary font-bold">ANALYZING...</p>`;

            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const lines = ev.target.result.split(/\r?\n/);
                    const records = [];
                    // 精準處理引號欄位的正則
                    const csvRegex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;

                    // 從第 3 行開始掃描 (Header 是 index 2)
                    for (let i = 3; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line || line.replace(/,/g, '').trim() === '') continue;

                        const cols = line.split(csvRegex).map(c => c.trim().replace(/^"|"$/g, '').trim());
                        
                        // 基礎檢核：姓名與獎金金額不能為空
                        if (cols.length < 10 || !cols[1] || !cols[8]) continue;

                        // 偏移容錯：合併案別之後的所有欄位來搜尋「已發完」
                        const extendedNote = cols.slice(9).join(' ');
                        const isPaid = extendedNote.includes('已發完') || extendedNote.includes('已領');

                        records.push({
                            date: cols[0],
                            name: cols[1],
                            role: cols[2],
                            amount: cols[8].replace(/[^0-9.-]+/g, ''), // 清洗金額
                            project: cols[9],
                            status: isPaid ? '已領' : '未領',
                            createdAt: Date.now()
                        });
                    }

                    if (records.length === 0) throw new Error("無效的檔案格式或空數據");

                    // 批次寫入 Firebase
                    const batchSize = 300;
                    for (let i = 0; i < records.length; i += batchSize) {
                        const batch = writeBatch(db);
                        records.slice(i, i + batchSize).forEach(record => {
                            const ref = doc(collection(db, 'artifacts', appId, 'public', 'data', 'bonuses'));
                            batch.set(ref, record);
                        });
                        await batch.commit();
                    }
                    alert(`成功匯入 ${records.length} 筆資料`);
                } catch (err) {
                    alert(`匯入失敗：${err.message}`);
                } finally {
                    resetUploadStatus();
                }
            };
            reader.readAsText(file);
        }

        function resetUploadStatus() {
            document.getElementById('upload-status').innerHTML = `<i data-lucide="upload-cloud" class="mx-auto w-8 h-8 text-gray-300 mb-2"></i><p class="text-[11px] text-accent">點擊或拖放檔案</p>`;
            lucide.createIcons();
        }

        document.getElementById('csv-file').onchange = (e) => processFile(e.target.files[0]);
        document.getElementById('form-auth').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('auth-name').value;
            const email = document.getElementById('auth-email').value;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'mappings'), { name, email });
            e.target.reset();
        };

        document.getElementById('btn-clear-data').onclick = async () => {
            if (!confirm("確定要刪除所有紀錄嗎？此操作不可還原。")) return;
            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'bonuses'));
            const batch = writeBatch(db);
            snap.forEach(d => batch.delete(d.ref));
            await batch.commit();
            alert("資料庫已清空");
        };

        window.showPage = (page) => {
            document.getElementById('page-dashboard').classList.toggle('hidden', page !== 'dashboard');
            document.getElementById('page-admin').classList.toggle('hidden', page !== 'admin');
            document.getElementById('tab-dashboard').className = (page === 'dashboard' ? "whitespace-nowrap px-6 py-2 rounded-full bg-primary text-white text-xs font-medium shadow-sm" : "whitespace-nowrap px-6 py-2 rounded-full bg-white border border-secondary text-accent text-xs hover:border-primary transition-all");
            document.getElementById('tab-admin').className = (page === 'admin' ? "whitespace-nowrap px-6 py-2 rounded-full bg-primary text-white text-xs font-medium shadow-sm" : "whitespace-nowrap px-6 py-2 rounded-full bg-white border border-secondary text-accent text-xs hover:border-primary transition-all");
        };
    </script>
</body>
</html>
