<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#7fb9b3" />
  <title>即時換匯計算機</title>
  <style>
    :root {
      --bg1: #f7faf7;
      --bg2: #edf5f2;
      --panel: rgba(255,255,255,0.86);
      --panel-solid: #ffffff;
      --text: #384544;
      --muted: #7d8d8c;
      --line: #d9e5e1;

      --mint: #78b6b0;
      --mint-deep: #4b9b97;
      --mint-soft: #e8f4f2;

      --yellow: #f0cb67;
      --yellow-deep: #d8b34c;
      --yellow-soft: #fff3c9;

      --number: #f6f6f6;
      --number-deep: #e1e1e1;
      --danger: #ea7d7d;

      --shadow-card: 0 18px 40px rgba(126, 159, 152, 0.16);
      --shadow-soft: 0 8px 18px rgba(127, 185, 179, 0.12);

      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(240, 203, 103, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(120, 182, 176, 0.18), transparent 30%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(100%, 560px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 14px 30px;
    }

    .hero {
      padding: 10px 6px 12px;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.15;
      letter-spacing: 0.5px;
      color: #435151;
    }

    .subtitle {
      margin: 10px 0 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .pill {
      flex: 0 0 auto;
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(120, 182, 176, 0.18);
      color: var(--mint-deep);
      font-size: 12px;
      font-weight: 700;
      box-shadow: var(--shadow-soft);
      white-space: nowrap;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(12px);
      padding: 18px;
      margin: 14px 0;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
      color: #445050;
    }

    .small-text {
      font-size: 12px;
      color: var(--muted);
    }

    .field {
      margin-bottom: 13px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
      font-size: 13px;
      color: var(--muted);
    }

    input, select {
      width: 100%;
      padding: 14px 15px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.9);
      color: var(--text);
      outline: none;
      transition: 0.18s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
    }

    input:focus, select:focus {
      border-color: #98c7c2;
      box-shadow: 0 0 0 4px rgba(120, 182, 176, 0.14);
    }

    input[readonly] {
      background: #fbfcfc;
    }

    .rate-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .ghost-btn, .main-btn, .danger-btn, .mini-btn {
      border-radius: 18px;
      padding: 13px 14px;
      font-weight: 800;
      transition: transform 0.12s ease, opacity 0.12s ease, box-shadow 0.12s ease;
    }

    .ghost-btn:active, .main-btn:active, .danger-btn:active, .mini-btn:active,
    .key:active, .swap-btn:active, .tab-btn:active {
      transform: scale(0.97);
    }

    .main-btn {
      width: 100%;
      background: linear-gradient(180deg, #8dc5bf 0%, var(--mint) 100%);
      color: #fff;
      box-shadow: 0 10px 20px rgba(120, 182, 176, 0.24);
    }

    .ghost-btn {
      background: #eff8f6;
      color: var(--mint-deep);
      box-shadow: 0 6px 14px rgba(120, 182, 176, 0.10);
    }

    .danger-btn {
      background: #fff2f2;
      color: var(--danger);
      box-shadow: 0 6px 14px rgba(234, 125, 125, 0.08);
    }

    .mini-btn {
      padding: 10px 11px;
      background: #edf8f6;
      color: var(--mint-deep);
    }

    .amount-wrap {
      position: relative;
    }

    .amount-input {
      font-size: 26px;
      font-weight: 900;
      text-align: right;
      letter-spacing: 0.5px;
      min-height: 62px;
    }

    .expression-hint {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      min-height: 18px;
    }

    .swap-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      margin: 6px 0 14px;
    }

    .swap-line {
      height: 1px;
      background: var(--line);
    }

    .swap-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(180deg, #ffffff 0%, #f5fbfa 100%);
      color: var(--mint-deep);
      font-size: 20px;
      box-shadow: 0 8px 18px rgba(120, 182, 176, 0.15);
    }

    .calc-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tab-btn {
      border-radius: 999px;
      padding: 11px;
      background: #f4f7f7;
      color: var(--muted);
      font-weight: 800;
      border: 1px solid transparent;
    }

    .tab-btn.active {
      background: #e8f4f2;
      color: var(--mint-deep);
      border-color: #cae2df;
      box-shadow: inset 0 -2px 0 rgba(120, 182, 176, 0.18);
    }

    .calc-frame {
      border-radius: 28px;
      background: linear-gradient(180deg, #eef2f1 0%, #ecf2ef 100%);
      border: 2px solid #d4dfdb;
      padding: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .calculator {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      user-select: none;
    }

    .key {
      min-height: 74px;
      border-radius: 18px;
      font-size: 24px;
      font-weight: 900;
      color: #485252;
      border: 2px solid rgba(0,0,0,0.06);
      box-shadow: 0 7px 0 rgba(127, 185, 179, 0.22);
      background: linear-gradient(180deg, #ffffff 0%, #f2f2f2 100%);
    }

    .key.num {
      background: linear-gradient(180deg, #fbfbfb 0%, #f0f0f0 100%);
    }

    .key.top {
      background: linear-gradient(180deg, #f6d678 0%, var(--yellow) 100%);
      box-shadow: 0 7px 0 rgba(216, 179, 76, 0.38);
    }

    .key.op, .key.equal {
      color: #ffffff;
      background: linear-gradient(180deg, #63b7b2 0%, #56aaa7 100%);
      box-shadow: 0 7px 0 rgba(74, 145, 142, 0.42);
    }

    .key.zero {
      grid-column: span 2;
    }

    .record-form {
      display: grid;
      gap: 10px;
    }

    .record-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .total-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 15px;
      border-radius: 20px;
      background: linear-gradient(180deg, #f7fcfb 0%, #edf7f5 100%);
      border: 1px solid #dce9e5;
      margin-top: 12px;
    }

    .total-box .amount {
      font-size: 24px;
      font-weight: 900;
      color: var(--mint-deep);
    }

    .record-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .record-item {
      border: 1px solid #e2ece8;
      border-radius: 20px;
      background: rgba(255,255,255,0.88);
      padding: 14px;
      box-shadow: 0 8px 18px rgba(120, 182, 176, 0.08);
    }

    .record-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .record-name {
      font-size: 16px;
      font-weight: 900;
      line-height: 1.35;
      word-break: break-word;
    }

    .record-date {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .record-money {
      margin-top: 10px;
      display: grid;
      gap: 5px;
      font-size: 14px;
      color: var(--muted);
    }

    .record-money strong {
      font-size: 18px;
      color: var(--text);
    }

    .record-location {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .record-buttons {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .record-buttons button {
      flex: 1;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 18px 6px;
      border-radius: 18px;
      border: 1px dashed #d7e5e0;
      background: rgba(255,255,255,0.7);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%) translateY(20px);
      width: calc(100% - 30px);
      max-width: 480px;
      padding: 13px 15px;
      border-radius: 18px;
      background: rgba(56, 69, 68, 0.92);
      color: #fff;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.22s ease;
      z-index: 20;
      font-size: 14px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .footer-note {
      padding: 6px 10px 0;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.6;
    }

    @media (max-width: 420px) {
      .app { padding: 16px 12px 28px; }
      h1 { font-size: 28px; }
      .card { padding: 16px; }
      .key { min-height: 68px; font-size: 22px; }
      .amount-input { font-size: 24px; }
    }

    @media (max-width: 360px) {
      .grid-2 { grid-template-columns: 1fr; }
      .rate-row { grid-template-columns: 1fr; }
      .record-actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1>即時換匯<br>計算機</h1>
          <div class="subtitle">手機使用友善，支援即時匯率、手動修改匯率、費用紀錄與本機保存。</div>
        </div>
        <div class="pill" id="rateStatus">準備更新</div>
      </div>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>匯率設定</h2>
        <span class="small-text" id="lastUpdated">尚未更新</span>
      </div>

      <div class="field">
        <div class="label-row">
          <label for="currencySelect">幣別</label>
          <span>以 1 外幣 = 幾元台幣計算</span>
        </div>
        <select id="currencySelect"></select>
      </div>

      <div class="rate-row">
        <div class="field" style="margin-bottom:0;">
          <div class="label-row">
            <label for="rateInput">即期匯率 / 手動匯率</label>
            <span id="manualHint">可自行修改</span>
          </div>
          <input id="rateInput" inputmode="decimal" type="number" step="0.0001" min="0" placeholder="例如 0.2200" />
        </div>
        <button class="ghost-btn" id="refreshRateBtn" type="button">更新</button>
      </div>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>金額換算</h2>
        <span class="small-text">金額自動四捨五入為整數</span>
      </div>

      <div class="field">
        <div class="label-row">
          <label for="foreignAmount">外幣金額</label>
          <span id="foreignCodeLabel">JPY</span>
        </div>
        <div class="amount-wrap">
          <input class="amount-input" id="foreignAmount" type="text" inputmode="none" readonly placeholder="0" />
          <div class="expression-hint" id="foreignHint"></div>
        </div>
      </div>

      <div class="swap-row">
        <div class="swap-line"></div>
        <button class="swap-btn" id="swapFocusBtn" type="button" title="切換輸入欄位">⇅</button>
        <div class="swap-line"></div>
      </div>

      <div class="field">
        <div class="label-row">
          <label for="twdAmount">台幣金額</label>
          <span>TWD</span>
        </div>
        <div class="amount-wrap">
          <input class="amount-input" id="twdAmount" type="text" inputmode="none" readonly placeholder="0" />
          <div class="expression-hint" id="twdHint"></div>
        </div>
      </div>

      <div class="calc-tabs">
        <button class="tab-btn active" id="tabForeign" type="button">輸入外幣</button>
        <button class="tab-btn" id="tabTwd" type="button">輸入台幣</button>
      </div>

      <div class="calc-frame">
        <div class="calculator" aria-label="小型計算機">
          <button class="key top" data-key="AC" type="button">C</button>
          <button class="key top" data-key="DEL" type="button">←</button>
          <button class="key top" data-key="%" type="button">%</button>
          <button class="key op" data-key="/" type="button">÷</button>

          <button class="key num" data-key="7" type="button">7</button>
          <button class="key num" data-key="8" type="button">8</button>
          <button class="key num" data-key="9" type="button">9</button>
          <button class="key op" data-key="*" type="button">×</button>

          <button class="key num" data-key="4" type="button">4</button>
          <button class="key num" data-key="5" type="button">5</button>
          <button class="key num" data-key="6" type="button">6</button>
          <button class="key op" data-key="-" type="button">−</button>

          <button class="key num" data-key="1" type="button">1</button>
          <button class="key num" data-key="2" type="button">2</button>
          <button class="key num" data-key="3" type="button">3</button>
          <button class="key op" data-key="+" type="button">＋</button>

          <button class="key num zero" data-key="0" type="button">0</button>
          <button class="key num" data-key="." type="button">.</button>
          <button class="key equal" data-key="=" type="button">＝</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>費用紀錄</h2>
        <button class="danger-btn" id="clearAllBtn" type="button">全部清除</button>
      </div>

      <div class="record-form">
        <div class="grid-2">
          <div class="field" style="margin-bottom:0;">
            <div class="label-row"><label for="recordDate">日期</label></div>
            <input id="recordDate" type="date" />
          </div>

          <div class="field" style="margin-bottom:0;">
            <div class="label-row"><label for="recordPlace">地點</label></div>
            <input id="recordPlace" type="text" placeholder="可空白" />
          </div>
        </div>

        <div class="field" style="margin-bottom:0;">
          <div class="label-row"><label for="recordName">這筆是什麼費用？</label></div>
          <input id="recordName" type="text" placeholder="例如：餐費、交通、伴手禮" />
        </div>

        <div class="record-actions">
          <button class="main-btn" id="saveRecordBtn" type="button">新增紀錄</button>
          <button class="ghost-btn" id="cancelEditBtn" type="button" style="display:none;">取消修改</button>
        </div>
      </div>

      <div class="total-box">
        <div>
          <div class="small-text">目前總計</div>
          <div class="amount" id="totalTwd">NT$ 0</div>
        </div>
        <div class="small-text" id="totalCount">0 筆</div>
      </div>

      <div class="record-list" id="recordList"></div>
    </section>

    <div class="footer-note">
      匯率來源：ExchangeRate-API Open Access。資料通常每日更新，實際刷卡、銀行現鈔與手續費可能不同，如有需要可直接手動修改匯率。
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const currencies = [
      { code: "JPY", name: "日圓", emoji: "🇯🇵" },
      { code: "USD", name: "美元", emoji: "🇺🇸" },
      { code: "KRW", name: "韓元", emoji: "🇰🇷" },
      { code: "HKD", name: "港幣", emoji: "🇭🇰" },
      { code: "CNY", name: "人民幣", emoji: "🇨🇳" },
      { code: "THB", name: "泰銖", emoji: "🇹🇭" },
      { code: "EUR", name: "歐元", emoji: "🇪🇺" },
      { code: "GBP", name: "英鎊", emoji: "🇬🇧" },
      { code: "SGD", name: "新加坡幣", emoji: "🇸🇬" },
      { code: "AUD", name: "澳幣", emoji: "🇦🇺" },
      { code: "CAD", name: "加幣", emoji: "🇨🇦" },
      { code: "MYR", name: "馬幣", emoji: "🇲🇾" },
      { code: "VND", name: "越南盾", emoji: "🇻🇳" },
      { code: "PHP", name: "菲律賓披索", emoji: "🇵🇭" }
    ];

    const STORAGE_KEY = "mobileExchangeRecords_v2";
    const SETTING_KEY = "mobileExchangeSettings_v2";
    const RATE_CACHE_KEY = "mobileExchangeRateCache_v2";

    const $ = (id) => document.getElementById(id);

    const currencySelect = $("currencySelect");
    const rateInput = $("rateInput");
    const refreshRateBtn = $("refreshRateBtn");
    const rateStatus = $("rateStatus");
    const lastUpdated = $("lastUpdated");
    const manualHint = $("manualHint");
    const foreignCodeLabel = $("foreignCodeLabel");
    const foreignAmount = $("foreignAmount");
    const twdAmount = $("twdAmount");
    const foreignHint = $("foreignHint");
    const twdHint = $("twdHint");
    const tabForeign = $("tabForeign");
    const tabTwd = $("tabTwd");
    const swapFocusBtn = $("swapFocusBtn");
    const recordDate = $("recordDate");
    const recordPlace = $("recordPlace");
    const recordName = $("recordName");
    const saveRecordBtn = $("saveRecordBtn");
    const cancelEditBtn = $("cancelEditBtn");
    const clearAllBtn = $("clearAllBtn");
    const recordList = $("recordList");
    const totalTwd = $("totalTwd");
    const totalCount = $("totalCount");
    const toast = $("toast");

    let activeInput = "foreign";
    let expression = "";
    let records = [];
    let editingId = null;
    let settings = {
      currency: "JPY",
      rate: "",
      lastMode: "foreign"
    };

    function todayString() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function formatNumber(num) {
      if (!Number.isFinite(num)) return "0";
      return Math.round(num).toLocaleString("zh-TW");
    }

    function parseDisplayNumber(value) {
      if (!value) return 0;
      const num = Number(String(value).replace(/,/g, ""));
      return Number.isFinite(num) ? num : 0;
    }

    function normalizeNumberString(num) {
      if (!Number.isFinite(num)) return "";
      const rounded = Math.round(num * 100000) / 100000;
      return String(rounded);
    }

    function moneyTwd(num) {
      return `NT$ ${formatNumber(num)}`;
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function saveSettings() {
      settings.currency = currencySelect.value;
      settings.rate = rateInput.value;
      settings.lastMode = activeInput;
      localStorage.setItem(SETTING_KEY, JSON.stringify(settings));
    }

    function loadSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(SETTING_KEY));
        if (saved) settings = { ...settings, ...saved };
      } catch (e) {}
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function loadRecords() {
      try {
        records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch (e) {
        records = [];
      }
    }

    function initCurrencyOptions() {
      currencySelect.innerHTML = currencies.map(c => (
        `<option value="${c.code}">${c.emoji} ${c.name} ${c.code}</option>`
      )).join("");
    }

    function updateCurrencyUI() {
      foreignCodeLabel.textContent = currencySelect.value;
    }

    function getRateCache() {
      try {
        return JSON.parse(localStorage.getItem(RATE_CACHE_KEY)) || {};
      } catch (e) {
        return {};
      }
    }

    function setRateCache(cache) {
      localStorage.setItem(RATE_CACHE_KEY, JSON.stringify(cache));
    }

    async function fetchRate(code, force = false) {
      updateCurrencyUI();

      const cache = getRateCache();
      const cached = cache[code];
      const now = Date.now();
      const oneHour = 60 * 60 * 1000;

      if (!force && cached && now - cached.fetchedAt < oneHour) {
        rateInput.value = cached.rate;
        rateStatus.textContent = "使用快取";
        lastUpdated.textContent = cached.date ? `匯率日期：${cached.date}` : "已載入快取";
        refreshComputedAmounts();
        saveSettings();
        return;
      }

      rateStatus.textContent = "更新中...";
      refreshRateBtn.disabled = true;

      try {
        const url = `https://open.er-api.com/v6/latest/${encodeURIComponent(code)}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("匯率服務暫時無法使用");
        const data = await res.json();
        const rate = data && data.rates ? data.rates.TWD : null;
        if (!rate) throw new Error("沒有取得 TWD 匯率");

        const roundedRate = Number(rate).toFixed(rate < 1 ? 5 : 4);

        rateInput.value = roundedRate;
        cache[code] = {
          rate: roundedRate,
          date: data.time_last_update_utc ? new Date(data.time_last_update_utc).toLocaleDateString("zh-TW") : "",
          fetchedAt: now
        };

        setRateCache(cache);
        rateStatus.textContent = "已更新";
        lastUpdated.textContent = cache[code].date ? `匯率日期：${cache[code].date}` : "剛剛更新";
        manualHint.textContent = "可自行修改";
        refreshComputedAmounts();
        saveSettings();
      } catch (err) {
        rateStatus.textContent = "更新失敗";
        showToast("抓不到即時匯率，請手動輸入匯率");
        if (cached && cached.rate) {
          rateInput.value = cached.rate;
          lastUpdated.textContent = "使用上次快取匯率";
          refreshComputedAmounts();
        }
      } finally {
        refreshRateBtn.disabled = false;
      }
    }

    function getRate() {
      const rate = Number(rateInput.value);
      return Number.isFinite(rate) && rate > 0 ? rate : 0;
    }

    function safeEval(expr) {
      if (!expr) return 0;
      let cleaned = String(expr).replace(/,/g, "");
      if (!/^[0-9+\-*/. ()]+$/.test(cleaned)) return 0;
      while (/[+\-*/.]$/.test(cleaned)) cleaned = cleaned.slice(0, -1);
      if (!cleaned) return 0;

      try {
        const result = Function(`"use strict"; return (${cleaned})`)();
        return Number.isFinite(result) ? result : 0;
      } catch (e) {
        return 0;
      }
    }

    function getActiveValue() {
      if (expression) return safeEval(expression);
      return activeInput === "foreign"
        ? parseDisplayNumber(foreignAmount.value)
        : parseDisplayNumber(twdAmount.value);
    }

    function updateHints() {
      if (activeInput === "foreign") {
        foreignHint.textContent = expression ? `算式：${expression}` : "";
        twdHint.textContent = "";
      } else {
        twdHint.textContent = expression ? `算式：${expression}` : "";
        foreignHint.textContent = "";
      }
    }

    function refreshComputedAmounts() {
      const rate = getRate();
      const value = getActiveValue();

      if (!value) {
        if (activeInput === "foreign") {
          if (!expression) foreignAmount.value = "";
          twdAmount.value = "";
        } else {
          if (!expression) twdAmount.value = "";
          foreignAmount.value = "";
        }
        updateHints();
        return;
      }

      if (activeInput === "foreign") {
        foreignAmount.value = expression ? expression : formatNumber(value);
        twdAmount.value = rate ? formatNumber(value * rate) : "";
      } else {
        twdAmount.value = expression ? expression : formatNumber(value);
        foreignAmount.value = rate ? formatNumber(value / rate) : "";
      }

      updateHints();
    }

    function setActiveInput(type) {
      if (type === activeInput) return;
      const currentValue = getActiveValue();
      activeInput = type;
      tabForeign.classList.toggle("active", type === "foreign");
      tabTwd.classList.toggle("active", type === "twd");
      expression = currentValue ? normalizeNumberString(currentValue) : "";
      refreshComputedAmounts();
      saveSettings();
    }

    function clearCalculator() {
      expression = "";
      foreignAmount.value = "";
      twdAmount.value = "";
      foreignHint.textContent = "";
      twdHint.textContent = "";
    }

    function handleCalcKey(key) {
      const operators = ["+", "-", "*", "/"];
      const last = expression.slice(-1);

      if (key === "AC") {
        clearCalculator();
        return;
      }

      if (key === "DEL") {
        expression = expression.slice(0, -1);
        refreshComputedAmounts();
        return;
      }

      if (key === "%") {
        if (!expression) return;
        const value = safeEval(expression);
        expression = value ? normalizeNumberString(value / 100) : "";
        refreshComputedAmounts();
        return;
      }

      if (key === "=") {
        const result = safeEval(expression);
        expression = result ? normalizeNumberString(result) : "";
        refreshComputedAmounts();
        expression = "";
        return;
      }

      if (operators.includes(key)) {
        if (!expression) return;
        if (operators.includes(last)) expression = expression.slice(0, -1);
        expression += key;
        refreshComputedAmounts();
        return;
      }

      if (key === ".") {
        const parts = expression.split(/[+\-*/]/);
        const current = parts[parts.length - 1];
        if (current.includes(".")) return;
        if (!expression || operators.includes(last)) expression += "0";
      }

      expression += key;
      refreshComputedAmounts();
    }

    function currentAmounts() {
      const rate = getRate();
      const activeValue = getActiveValue();

      let foreign = activeInput === "foreign" ? activeValue : (rate ? activeValue / rate : 0);
      let twd = activeInput === "twd" ? activeValue : (rate ? activeValue * rate : 0);

      return {
        foreign: Math.round(foreign || 0),
        twd: Math.round(twd || 0),
        rate
      };
    }

    function resetRecordForm() {
      editingId = null;
      recordName.value = "";
      recordPlace.value = "";
      recordDate.value = todayString();
      saveRecordBtn.textContent = "新增紀錄";
      cancelEditBtn.style.display = "none";
    }

    function saveCurrentRecord() {
      const { foreign, twd, rate } = currentAmounts();
      const name = recordName.value.trim();

      if (!foreign && !twd) {
        showToast("請先輸入金額");
        return;
      }
      if (!name) {
        showToast("請輸入這筆是什麼費用");
        return;
      }
      if (!rate) {
        showToast("請先輸入匯率");
        return;
      }

      const item = {
        id: editingId || String(Date.now()),
        date: recordDate.value || todayString(),
        name,
        place: recordPlace.value.trim(),
        currency: currencySelect.value,
        rate,
        foreign,
        twd,
        createdAt: editingId ? (records.find(r => r.id === editingId)?.createdAt || Date.now()) : Date.now()
      };

      if (editingId) {
        records = records.map(r => r.id === editingId ? item : r);
        showToast("已修改紀錄");
      } else {
        records.unshift(item);
        showToast("已新增紀錄");
      }

      saveRecords();
      renderRecords();
      resetRecordForm();
    }

    function editRecord(id) {
      const item = records.find(r => r.id === id);
      if (!item) return;

      editingId = id;
      currencySelect.value = item.currency;
      rateInput.value = item.rate;
      recordDate.value = item.date;
      recordName.value = item.name;
      recordPlace.value = item.place || "";
      saveRecordBtn.textContent = "儲存修改";
      cancelEditBtn.style.display = "block";

      activeInput = "foreign";
      tabForeign.classList.add("active");
      tabTwd.classList.remove("active");
      expression = "";
      foreignAmount.value = formatNumber(item.foreign);
      twdAmount.value = formatNumber(item.twd);
      foreignHint.textContent = "";
      twdHint.textContent = "";
      updateCurrencyUI();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteRecord(id) {
      records = records.filter(r => r.id !== id);
      saveRecords();
      renderRecords();
      showToast("已刪除紀錄");
    }

    function clearAllRecords() {
      if (!records.length) {
        showToast("目前沒有紀錄");
        return;
      }

      if (!confirm("確定要清除全部紀錄嗎？這個動作無法復原。")) return;
      records = [];
      saveRecords();
      renderRecords();
      showToast("已清除全部紀錄");
    }

    function renderRecords() {
      const total = records.reduce((sum, item) => sum + Number(item.twd || 0), 0);
      totalTwd.textContent = moneyTwd(total);
      totalCount.textContent = `${records.length} 筆`;

      if (!records.length) {
        recordList.innerHTML = `<div class="empty">還沒有紀錄，輸入金額後按「新增紀錄」就會保存在本機裡。</div>`;
        return;
      }

      recordList.innerHTML = records.map(item => `
        <article class="record-item">
          <div class="record-head">
            <div>
              <div class="record-name">${escapeHtml(item.name)}</div>
              <div class="record-date">${escapeHtml(item.date)}</div>
            </div>
            <div class="small-text">${escapeHtml(item.currency)}</div>
          </div>

          <div class="record-money">
            <div><strong>${formatNumber(item.foreign)}</strong> ${escapeHtml(item.currency)} ≈ <strong>${moneyTwd(item.twd)}</strong></div>
            <div>匯率：1 ${escapeHtml(item.currency)} = ${Number(item.rate).toFixed(5)} TWD</div>
          </div>

          ${item.place ? `<div class="record-location">地點：${escapeHtml(item.place)}</div>` : ""}

          <div class="record-buttons">
            <button class="mini-btn" type="button" onclick="editRecord('${item.id}')">修改</button>
            <button class="danger-btn" type="button" onclick="deleteRecord('${item.id}')">刪除</button>
          </div>
        </article>
      `).join("");
    }

    function bindEvents() {
      currencySelect.addEventListener("change", () => {
        fetchRate(currencySelect.value, false);
      });

      refreshRateBtn.addEventListener("click", () => {
        fetchRate(currencySelect.value, true);
      });

      rateInput.addEventListener("input", () => {
        manualHint.textContent = "已使用手動匯率";
        refreshComputedAmounts();
        saveSettings();
      });

      tabForeign.addEventListener("click", () => setActiveInput("foreign"));
      tabTwd.addEventListener("click", () => setActiveInput("twd"));

      swapFocusBtn.addEventListener("click", () => {
        setActiveInput(activeInput === "foreign" ? "twd" : "foreign");
      });

      document.querySelector(".calculator").addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-key]");
        if (!btn) return;
        handleCalcKey(btn.dataset.key);
      });

      saveRecordBtn.addEventListener("click", saveCurrentRecord);
      cancelEditBtn.addEventListener("click", resetRecordForm);
      clearAllBtn.addEventListener("click", clearAllRecords);
    }

    function init() {
      loadSettings();
      loadRecords();
      initCurrencyOptions();

      currencySelect.value = settings.currency || "JPY";
      rateInput.value = settings.rate || "";
      activeInput = settings.lastMode || "foreign";
      recordDate.value = todayString();

      updateCurrencyUI();
      bindEvents();
      renderRecords();

      tabForeign.classList.toggle("active", activeInput === "foreign");
      tabTwd.classList.toggle("active", activeInput === "twd");

      fetchRate(currencySelect.value, false);
    }

    window.editRecord = editRecord;
    window.deleteRecord = deleteRecord;

    init();
  </script>
</body>
</html>
