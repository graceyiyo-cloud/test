<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工程費用計算</title>
    <style>
        :root {
            --bg: #F4F7F6;
            --card: #FFFFFF;
            --primary: #4A5D4E; 
            --accent: #D4A373;
            --text: #2C3E50;
            --label-text: #5D6D7E;
            --border: #D5DBDB;
            --danger: #C0392B;
            --success: #27AE60;
        }

        body { background-color: var(--bg); color: var(--text); font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .page { width: 100%; max-width: 500px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); width: 100%; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); box-sizing: border-box; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }
        
        h2 { text-align: center; color: var(--primary); font-weight: 700; margin-bottom: 25px; letter-spacing: 2px; }
        .row { display: flex; gap: 12px; margin-bottom: 18px; align-items: flex-end; }
        .col { flex: 1; display: flex; flex-direction: column; }
        
        label { font-size: 0.85rem; margin-bottom: 8px; color: var(--label-text); font-weight: 600; }
        .tip { font-weight: normal; font-size: 0.75rem; color: var(--accent); }
        
        input { padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 1rem; outline: none; background: #FFF; width: 100%; box-sizing: border-box; transition: all 0.2s; }
        input:focus { border-color: var(--primary); background: #FDFFFD; }
        
        input[readonly] { background: #F8F9F9; border-color: #EBEDEF; color: #7F8C8D; }

        #netAmount { 
            font-size: 1.5rem; 
            font-weight: 800; 
            color: var(--primary); 
            border: 3px solid var(--primary); 
            background: #FFF; 
            text-align: center;
            height: 60px;
            box-shadow: 0 4px 10px rgba(74, 93, 78, 0.1);
        }
        
        .config-box { background: #FDFEFE; padding: 18px; border-radius: 15px; margin: 20px 0; border: 1.5px solid #E5E8E8; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        
        .display-area { background: #F8F9F9; border-radius: 15px; padding: 20px; margin-top: 20px; border: 1px solid #EAEDED; }
        .section-title { font-size: 0.9rem; font-weight: 800; color: var(--primary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; width: 4px; height: 16px; background: var(--primary); border-radius: 2px; }
        
        .formula { font-size: 0.95rem; line-height: 1.8; color: #444; }
        .formula strong { color: #000; font-weight: 700; }
        .subtotal-line { background: #E9F2EC; padding: 6px 12px; border-radius: 8px; color: #2D5A3F !important; margin: 8px 0; font-weight: 600; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-copy { flex: 2; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-copy:active { transform: scale(0.98); opacity: 0.9; }
        .btn-reset { flex: 1; padding: 14px; background: #FFF; color: var(--danger); border: 1.5px solid var(--danger); border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-reset:hover { background: #FFF5F5; }

        .check-label { display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text); font-size: 0.9rem; }
        .check-label input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); }

        .toggle-group { 
            display: flex; 
            background: #EBEDEF; 
            border-radius: 12px; 
            padding: 4px; 
            height: 46px;
            box-sizing: border-box;
        }
        .toggle-group label { flex: 1; margin: 0; cursor: pointer; }
        .toggle-group input { display: none; }
        .toggle-group span { 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            border-radius: 10px;
            color: #7F8C8D;
            font-size: 0.9rem;
            font-weight: 700;
            transition: all 0.3s;
        }
        .toggle-group input:checked + span { 
            background: var(--primary); 
            color: #FFFFFF; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        #calcBaseGroup input:checked + span {
            background: var(--accent);
        }
    </style>
</head>
<body>

<div id="calcPage" class="page">
    <div class="card">
        <h2>工程費用計算</h2>
        
        <div class="row">
            <div class="col">
                <label>輸入金額</label>
                <input type="number" id="inputAmount" placeholder="0" oninput="calculate()">
            </div>
            <div class="col">
                <label>金額類型</label>
                <div class="toggle-group">
                    <label>
                        <input type="radio" name="taxType" value="exclude" checked onchange="calculate()">
                        <span>未稅</span>
                    </label>
                    <label>
                        <input type="radio" name="taxType" value="include" onchange="calculate()">
                        <span>含稅</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label>未稅金額</label>
                <input type="number" id="rawAmount" readonly>
            </div>
            <div class="col">
                <label>稅額 (5%)</label>
                <input type="number" id="taxAmount" readonly>
            </div>
        </div>

        <div class="config-box">
            <div class="row">
                <div class="col">
                    <label>計算基準 <span class="tip">(影響清潔費與保留款母數)</span></label>
                    <div class="toggle-group" id="calcBaseGroup">
                        <label>
                            <input type="radio" name="calcBase" value="total" checked onchange="calculate()">
                            <span>全額(含稅)</span>
                        </label>
                        <label>
                            <input type="radio" name="calcBase" value="raw" onchange="calculate()">
                            <span>未稅額</span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <label class="check-label"><input type="checkbox" id="cleanCheck" checked onchange="calculate()"> 清潔保險 (%)</label>
                    <input type="number" id="cleanRate" value="0.5" step="0.1" oninput="calculate()">
                </div>
                <div class="col">
                    <label>清潔保險金額</label>
                    <input type="number" id="cleanAmount" readonly>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <label class="check-label"><input type="checkbox" id="retentionCheck" checked onchange="calculate()"> 保留款 (%)</label>
                    <input type="number" id="retentionRate" value="10" step="1" oninput="calculate()">
                </div>
                <div class="col">
                    <label>保留款金額 (可手修)</label>
                    <input type="number" id="retentionAmount" oninput="calculate(true)">
                </div>
            </div>
            <div class="row" style="margin-bottom: 0;">
                <div class="col">
                    <label class="check-label">
                        <input type="checkbox" id="invoiceIncludeRetention" onchange="calculate()"> 
                        發票金額含保留款 <span class="tip">(勾選後將分列應付與發票)</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label>加款金額 <span class="tip">(請填含稅)</span></label>
                <input type="number" id="plusAmount" placeholder="0" oninput="calculate()">
            </div>
            <div class="col">
                <label>扣款金額 <span class="tip">(請填含稅)</span></label>
                <input type="number" id="minusAmount" placeholder="0" oninput="calculate()">
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label>最終淨額 (可手動修改)</label>
                <input type="number" id="netAmount" oninput="updateFormulaOnly()">
            </div>
        </div>

        <div class="display-area">
            <div class="section-title">計算明細</div>
            <div id="processFormula" class="formula">請輸入資料...</div>
        </div>

        <div class="btn-group">
            <button class="btn-copy" onclick="copyResult()">📋 複製計算明細</button>
            <button class="btn-reset" onclick="location.reload()">↺ 重填</button>
        </div>
    </div>
</div>

<script>
    const fmt = new Intl.NumberFormat('zh-TW');
    let lastCalcState = { raw: 0, tax: 0, total: 0, cRate: 0, cleanFee: 0, subtotal: 0, rRate: 0, retention: 0, plus: 0, minus: 0, invoiceIncludeRet: false, calcBase: 'total' };

    function calculate(isManualRetention = false) {
        const inputVal = parseFloat(document.getElementById('inputAmount').value) || 0;
        const taxType = document.querySelector('input[name="taxType"]:checked').value;
        const calcBase = document.querySelector('input[name="calcBase"]:checked').value;
        const plus = parseFloat(document.getElementById('plusAmount').value) || 0;
        const minus = parseFloat(document.getElementById('minusAmount').value) || 0;
        const invoiceIncludeRet = document.getElementById('invoiceIncludeRetention').checked;
        
        let raw = 0, tax = 0, total = 0;

        // 1. 基礎稅額拆分
        if (taxType === "exclude") {
            raw = inputVal;
            tax = Math.round(raw * 0.05);
            total = raw + tax;
        } else {
            total = inputVal;
            raw = Math.round(total / 1.05);
            tax = total - raw;
        }

        document.getElementById('rawAmount').value = raw || "";
        document.getElementById('taxAmount').value = tax || "";
        
        // 2. 決定計算清潔費與保留款的基準母數
        const baseAmt = (calcBase === 'total') ? total : raw;

        // 3. 清潔費
        const hasClean = document.getElementById('cleanCheck').checked;
        const cRate = parseFloat(document.getElementById('cleanRate').value) || 0;
        const cleanFee = hasClean ? Math.round(baseAmt * (cRate / 100)) : 0;
        document.getElementById('cleanAmount').value = cleanFee || "";

        // 4. 小計 (基準母數 - 清潔費)
        const subtotal = baseAmt - cleanFee;
        
        // 5. 保留款
        const hasRetention = document.getElementById('retentionCheck').checked;
        const rRate = parseFloat(document.getElementById('retentionRate').value) || 0;
        const retentionInput = document.getElementById('retentionAmount');
        let retention = hasRetention ? (isManualRetention ? (parseFloat(retentionInput.value) || 0) : Math.round(subtotal * (rRate / 100))) : 0;
        if(!isManualRetention) retentionInput.value = retention || "";
        
        // 6. 最終淨額計算
        let net = 0;
        if (calcBase === 'total') {
            // 含稅基準：(含稅額 - 清潔費 - 保留款) + 加扣款
            net = (subtotal - retention) + plus - minus;
        } else {
            // 未稅基準：(未稅額 - 清潔費 - 保留款) = 稅前餘額
            // 稅額 = 稅前餘額 * 5%
            // 淨額 = 稅前餘額 + 重算稅額 + 加扣款
            const preTaxRemain = subtotal - retention;
            const recalculatedTax = Math.round(preTaxRemain * 0.05);
            net = preTaxRemain + recalculatedTax + plus - minus;
            
            // 更新畫面上顯示的稅額，使其與計算邏輯一致
            document.getElementById('taxAmount').value = recalculatedTax;
            tax = recalculatedTax;
        }

        lastCalcState = { raw, tax, total, cRate, cleanFee, subtotal, rRate, retention, plus, minus, invoiceIncludeRet, calcBase };
        document.getElementById('netAmount').value = net;
        renderFormula(net);
    }

    function updateFormulaOnly() {
        const manualNet = parseFloat(document.getElementById('netAmount').value) || 0;
        renderFormula(manualNet);
    }

    function renderFormula(currentNet) {
        if (lastCalcState.raw === 0 && lastCalcState.plus === 0 && lastCalcState.minus === 0) {
            document.getElementById('processFormula').innerHTML = "請輸入資料...";
            return;
        }

        let html = "";
        const isRawBase = lastCalcState.calcBase === 'raw';
        const baseAmtLabel = isRawBase ? fmt.format(lastCalcState.raw) : fmt.format(lastCalcState.total);
        const baseName = isRawBase ? "未稅額" : "含稅總額";

        html += `<div>① 基準 (${baseName})：<strong>${baseAmtLabel}</strong></div>`;
        
        let currentStep = 2;

        if (lastCalcState.cleanFee !== 0) {
            html += `<div>② 清潔費：${baseAmtLabel} × ${lastCalcState.cRate}% = <strong>-${fmt.format(lastCalcState.cleanFee)}</strong></div>`;
            html += `<div class="subtotal-line">③ 小計：${baseAmtLabel} - ${fmt.format(lastCalcState.cleanFee)} = ${fmt.format(lastCalcState.subtotal)}</div>`;
            currentStep = 4;
        }
        
        if (lastCalcState.retention !== 0) {
            const circle = currentStep === 4 ? '④' : '②';
            html += `<div>${circle} 保留款：${fmt.format(lastCalcState.subtotal)} × ${lastCalcState.rRate}% = <strong>-${fmt.format(lastCalcState.retention)}</strong></div>`;
            currentStep++;
        }

        const preTaxNet = lastCalcState.subtotal - lastCalcState.retention;

        if (isRawBase) {
            const circle = ['②','③','④','⑤','⑥'][currentStep-2] || '●';
            html += `<div>${circle} 稅額 (5%)：${fmt.format(preTaxNet)} × 5% = <strong>+${fmt.format(lastCalcState.tax)}</strong></div>`;
            currentStep++;
        }
        
        if (lastCalcState.plus !== 0) {
            const circle = ['②','③','④','⑤','⑥'][currentStep-2] || '●';
            html += `<div>${circle} 加款：<strong>+${fmt.format(lastCalcState.plus)}</strong></div>`;
            currentStep++;
        }
        
        if (lastCalcState.minus !== 0) {
            const circle = ['②','③','④','⑤','⑥'][currentStep-2] || '●';
            html += `<div>${circle} 扣款：<strong>-${fmt.format(lastCalcState.minus)}</strong></div>`;
        }

        html += `<div style="margin-top:8px; border-top:1.5px solid #DDD; padding-top:8px; font-size: 0.85rem; color: #666;">`;
        
        let calcPath = `${fmt.format(preTaxNet)}`;
        if (isRawBase) calcPath = `(${calcPath} + ${fmt.format(lastCalcState.tax)})`;
        if (lastCalcState.plus !== 0) calcPath += ` + ${fmt.format(lastCalcState.plus)}`;
        if (lastCalcState.minus !== 0) calcPath += ` - ${fmt.format(lastCalcState.minus)}`;

        if (lastCalcState.invoiceIncludeRet && lastCalcState.retention !== 0) {
            const invoiceAmt = currentNet + lastCalcState.retention;
            html += `<div>計算：${calcPath} = ${fmt.format(currentNet)}</div>`;
            html += `<div style="font-size: 1rem; color: var(--text); margin-top: 4px;">● 本次應付金額：<strong>${fmt.format(currentNet)}</strong></div>`;
            html += `<div style="font-size: 1rem; color: var(--text);">● 本次發票金額：<strong>${fmt.format(invoiceAmt)}</strong> <span class="tip">(含保留款)</span></div>`;
        } else {
            html += `<div>計算：${calcPath} = ${fmt.format(currentNet)}</div>`;
            html += `<div style="font-size: 1rem; color: var(--text); margin-top: 4px;">● 最終淨額：<strong>${fmt.format(currentNet)}</strong></div>`;
        }
        html += `</div>`;

        document.getElementById('processFormula').innerHTML = html;
    }

    function copyResult() {
        const net = parseFloat(document.getElementById('netAmount').value) || 0;
        if (!net || net == 0) { alert("請先輸入金額"); return; }

        const isRawBase = lastCalcState.calcBase === 'raw';
        const baseAmtLabel = isRawBase ? fmt.format(lastCalcState.raw) : fmt.format(lastCalcState.total);
        const baseName = isRawBase ? "未稅額" : "含稅總額";

        let text = `【工程費用計算明細】(基準：${baseName})\n`;
        text += `① 基準金額：${baseAmtLabel}\n`;
        
        let currentStep = 2;

        if (lastCalcState.cleanFee !== 0) {
            text += `② 清潔費：${baseAmtLabel} × ${lastCalcState.cRate}% = -${fmt.format(lastCalcState.cleanFee)}\n`;
            text += `③ 小計：${baseAmtLabel} - ${fmt.format(lastCalcState.cleanFee)} = ${fmt.format(lastCalcState.subtotal)}\n`;
            currentStep = 4;
        }
        
        if (lastCalcState.retention !== 0) {
            const circle = currentStep === 4 ? '④' : '②';
            text += `${circle} 保留款：${fmt.format(lastCalcState.subtotal)} × ${lastCalcState.rRate}% = -${fmt.format(lastCalcState.retention)}\n`;
            currentStep++;
        }

        const preTaxNet = lastCalcState.subtotal - lastCalcState.retention;

        if (isRawBase) {
            const circle = ['②','③','④','⑤','⑥'][currentStep-2] || '●';
            text += `${circle} 稅額 (5%)：${fmt.format(preTaxNet)} × 5% = +${fmt.format(lastCalcState.tax)}\n`;
            currentStep++;
        }
        
        if (lastCalcState.plus !== 0) {
            const circle = ['②','③','④','⑤','⑥'][currentStep-2] || '●';
            text += `${circle} 加款：+${fmt.format(lastCalcState.plus)}\n`;
            currentStep++;
        }
        
        if (lastCalcState.minus !== 0) {
            const circle = ['②','③','④','⑤','⑥'][currentStep-2] || '●';
            text += `${circle} 扣款：-${fmt.format(lastCalcState.minus)}\n`;
        }

        text += `------------------\n`;
        
        if (lastCalcState.invoiceIncludeRet && lastCalcState.retention !== 0) {
            const invoiceAmt = net + lastCalcState.retention;
            text += `● 本次應付金額：${fmt.format(net)}\n`;
            text += `● 本次發票金額：${fmt.format(invoiceAmt)} (含保留款)`;
        } else {
            text += `● 最終淨額：${fmt.format(net)}`;
        }

        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('.btn-copy');
            const originalText = btn.innerText;
            btn.innerText = "✅ 已複製明細";
            btn.style.background = "#27AE60";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "";
            }, 2000);
        });
    }
</script>

</body>
</html>
