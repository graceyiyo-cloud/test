<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0D1117">
  <title>換匯計算機</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0D1117;
      --card: #161B22;
      --card2: #1C2128;
      --card3: #21262D;
      --border: #30363D;
      --accent: #00D4AA;
      --accent-dim: rgba(0,212,170,0.12);
      --accent-glow: rgba(0,212,170,0.25);
      --danger: #FF6B6B;
      --danger-dim: rgba(255,107,107,0.12);
      --warn: #F0A500;
      --text: #F0F6FC;
      --text-2: #8B949E;
      --text-3: #484F58;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

    html, body {
      height: 100%;
      height: 100dvh;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
    }

    /* ─── HEADER ─── */
    .header {
      padding: 14px 18px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--card);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), #0099CC);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .header-title { font-size: 17px; font-weight: 700; letter-spacing: -0.4px; }
    .header-title em { font-style: normal; color: var(--accent); }
    .update-badge {
      font-size: 10px;
      color: var(--text-2);
      background: var(--card2);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ─── TAB CONTENT ─── */
    .tab-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
    .page { display: none; flex-direction: column; flex: 1; overflow: hidden; min-height: 0; }
    .page.active { display: flex; }

    /* ─── CURRENCY CHIPS ─── */
    .currency-scroll {
      padding: 12px 14px;
      overflow-x: auto;
      display: flex;
      gap: 7px;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--card);
    }
    .currency-scroll::-webkit-scrollbar { display: none; }
    .chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 7px 12px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--card2);
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
    }
    .chip.active { border-color: var(--accent); background: var(--accent-dim); }
    .chip .flag { font-size: 18px; line-height: 1.2; }
    .chip .code { font-size: 11px; font-weight: 700; letter-spacing: 0.3px; }
    .chip .name { font-size: 9px; color: var(--text-2); }

    /* ─── RATE BAR ─── */
    .rate-bar {
      padding: 9px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .rate-label { font-size: 11px; color: var(--text-2); white-space: nowrap; letter-spacing: 0.3px; }
    .rate-input {
      flex: 1;
      background: var(--card3);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
      outline: none;
      text-align: right;
      min-width: 0;
      -webkit-user-select: text;
      user-select: text;
    }
    .rate-input:focus { border-color: var(--accent); }
    .rate-unit { font-size: 11px; color: var(--text-2); white-space: nowrap; }
    .refresh-btn {
      background: none; border: none;
      color: var(--text-2);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 2px;
      border-radius: 6px;
      transition: color 0.2s;
      line-height: 1;
    }
    .refresh-btn:active { color: var(--accent); }
    .spinning { animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── AMOUNT FIELDS ─── */
    .amounts {
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
      background: var(--bg);
    }
    .amount-field {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 13px;
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .amount-field.active-field { border-color: var(--accent); background: var(--accent-dim); }
    .amount-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--text-2); margin-bottom: 2px;
    }
    .amount-row { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
    .amount-value {
      font-family: 'DM Mono', monospace;
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -1px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .amount-value.dim { color: var(--text-3); }
    .amount-currency { font-size: 12px; font-weight: 700; color: var(--text-2); }
    .cursor-indicator {
      display: none;
      width: 2px; height: 20px;
      background: var(--accent);
      border-radius: 1px;
      animation: blink 1s step-end infinite;
      flex-shrink: 0;
    }
    .active-field .cursor-indicator { display: block; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ─── NUMPAD ─── */
    .numpad {
      padding: 6px 12px 10px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      flex-shrink: 0;
      background: var(--bg);
    }
    .np {
      background: var(--card);
      border: none;
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 20px;
      font-weight: 500;
      height: 54px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, transform 0.08s;
      position: relative; overflow: hidden;
    }
    .np:active { background: var(--card3); transform: scale(0.95); }
    .np.np-func { background: var(--card2); color: var(--text-2); font-size: 16px; }
    .np.np-func:active { background: var(--card3); }
    .np.np-add {
      grid-column: span 2;
      background: var(--accent);
      color: #0A0E14;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }
    .np.np-add:active { background: #00B894; transform: scale(0.97); }

    /* ─── BOTTOM NAV ─── */
    .bottom-nav {
      display: flex;
      border-top: 1px solid var(--border);
      background: var(--card);
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .nav-btn {
      flex: 1;
      background: none; border: none;
      color: var(--text-3);
      padding: 10px 8px 12px;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      transition: color 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn span { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; }

    /* ─── RECORDS PAGE ─── */
    .records-toolbar {
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--card);
    }
    .records-title { font-size: 15px; font-weight: 700; }
    .clear-btn {
      background: none;
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.3px;
    }
    .clear-btn:active { background: var(--danger-dim); }

    .records-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      overscroll-behavior: contain;
    }
    .records-list::-webkit-scrollbar { width: 3px; }
    .records-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .rec-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 11px 13px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .rec-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px;
      margin-bottom: 5px;
    }
    .rec-desc { font-size: 14px; font-weight: 600; line-height: 1.3; flex: 1; }
    .rec-actions { display: flex; gap: 2px; flex-shrink: 0; }
    .rec-action {
      background: none; border: none;
      padding: 3px 6px; border-radius: 7px;
      font-size: 14px; cursor: pointer;
      transition: background 0.15s;
    }
    .rec-action:active { background: var(--card2); }
    .rec-meta {
      display: flex; flex-wrap: wrap; gap: 8px;
      font-size: 10px; color: var(--text-2);
      margin-bottom: 7px;
    }
    .rec-amounts { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
    .rec-foreign { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; }
    .rec-arrow { color: var(--text-3); font-size: 12px; }
    .rec-twd { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 700; color: var(--accent); }

    .records-total {
      margin: 6px 14px 10px;
      padding: 13px 16px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-glow);
      border-radius: 13px;
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    .total-label { font-size: 12px; color: var(--text-2); font-weight: 500; }
    .total-count { font-size: 10px; color: var(--text-3); }
    .total-amount {
      font-family: 'DM Mono', monospace;
      font-size: 20px; font-weight: 700; color: var(--accent);
    }

    .empty-state {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: var(--text-3); gap: 10px; padding: 20px;
    }
    .empty-icon { font-size: 48px; opacity: 0.4; }
    .empty-state p { font-size: 13px; text-align: center; }

    /* ─── BOTTOM SHEET ─── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .sheet {
      background: var(--card);
      border-radius: 22px 22px 0 0;
      padding: 8px 20px 28px;
      width: 100%;
      max-height: 90dvh;
      overflow-y: auto;
      transform: translateY(40px);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    }
    .overlay.show .sheet { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 10px auto 16px;
    }
    .sheet-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
    .sheet-field { margin-bottom: 13px; }
    .sheet-lbl { font-size: 10px; color: var(--text-2); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 5px; }
    .sheet-inp {
      width: 100%;
      background: var(--card2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
    }
    .sheet-inp:focus { border-color: var(--accent); }
    .amount-preview {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text-2);
    }
    .amount-preview strong { color: var(--accent); }
    .sheet-actions { display: flex; gap: 8px; margin-top: 16px; }
    .sh-cancel {
      flex: 1;
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text-2);
      font-size: 15px; font-weight: 500; padding: 13px;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .sh-confirm {
      flex: 2;
      background: var(--accent); border: none;
      border-radius: 12px; color: #0A0E14;
      font-size: 15px; font-weight: 700; padding: 13px;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .sh-confirm:active { background: #00B894; }
    .sh-cancel:active { background: var(--card3); }

    /* ─── TOAST ─── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--card3); border: 1px solid var(--border);
      color: var(--text); padding: 9px 18px;
      border-radius: 20px; font-size: 13px;
      z-index: 999; opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── COLOR CODED CURRENCY TAG ─── */
    .rec-currency-tag {
      display: inline-block;
      font-size: 9px; font-weight: 700;
      padding: 1px 6px;
      border-radius: 5px;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-glow);
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">💱</div>
    <div class="header-title">換<em>匯</em>計算機</div>
  </div>
  <div class="update-badge" id="updateBadge">匯率更新中…</div>
</div>

<!-- TAB CONTENT -->
<div class="tab-content">

  <!-- ══ CALC PAGE ══ -->
  <div class="page active" id="page-calc">

    <!-- Currency Chips -->
    <div class="currency-scroll" id="chipScroll"></div>

    <!-- Rate Bar -->
    <div class="rate-bar">
      <span class="rate-label">即期匯率</span>
      <input type="number" class="rate-input" id="rateInput" step="0.0001" placeholder="—">
      <span class="rate-unit" id="rateUnit">TWD/USD</span>
      <button class="refresh-btn" id="refreshBtn" onclick="fetchRate()">↻</button>
    </div>

    <!-- Amount Fields -->
    <div class="amounts">
      <div class="amount-field active-field" id="foreignField" onclick="setActive('foreign')">
        <div class="amount-label">外幣金額 <span id="foreignCurrLabel">USD</span></div>
        <div class="amount-row">
          <div class="amount-value dim" id="foreignDisplay">0</div>
          <div class="cursor-indicator"></div>
          <div class="amount-currency" id="foreignCurrTag">USD</div>
        </div>
      </div>
      <div class="amount-field" id="twdField" onclick="setActive('twd')">
        <div class="amount-label">台幣金額 TWD</div>
        <div class="amount-row">
          <div class="amount-value dim" id="twdDisplay">NT$0</div>
          <div class="cursor-indicator"></div>
          <div class="amount-currency">TWD</div>
        </div>
      </div>
    </div>

    <!-- Numpad -->
    <div class="numpad">
      <button class="np" ontouchstart="" onclick="pad('7')">7</button>
      <button class="np" ontouchstart="" onclick="pad('8')">8</button>
      <button class="np" ontouchstart="" onclick="pad('9')">9</button>
      <button class="np" ontouchstart="" onclick="pad('4')">4</button>
      <button class="np" ontouchstart="" onclick="pad('5')">5</button>
      <button class="np" ontouchstart="" onclick="pad('6')">6</button>
      <button class="np" ontouchstart="" onclick="pad('1')">1</button>
      <button class="np" ontouchstart="" onclick="pad('2')">2</button>
      <button class="np" ontouchstart="" onclick="pad('3')">3</button>
      <button class="np" ontouchstart="" onclick="pad('.')">·</button>
      <button class="np" ontouchstart="" onclick="pad('0')">0</button>
      <button class="np np-func" ontouchstart="" onclick="backspace()">⌫</button>
      <button class="np np-func" ontouchstart="" onclick="clearAll()" style="font-size:13px;">清除</button>
      <button class="np np-add" ontouchstart="" onclick="openSheet()">＋ 加入紀錄</button>
    </div>

  </div>

  <!-- ══ RECORDS PAGE ══ -->
  <div class="page" id="page-records">
    <div class="records-toolbar">
      <div class="records-title">費用紀錄</div>
      <button class="clear-btn" onclick="clearAllRecords()">全部清除</button>
    </div>
    <div class="records-list" id="recordsList"></div>
    <div class="records-total">
      <div>
        <div class="total-label">📊 總計台幣</div>
        <div class="total-count" id="totalCount">共 0 筆</div>
      </div>
      <div class="total-amount" id="totalAmount">NT$0</div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-calc" onclick="switchTab('calc')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <path d="M9 9h.01M12 9h.01M15 9h.01M9 12h.01M12 12h.01M15 12h.01M9 15h.01M12 15h3"/>
    </svg>
    <span>換算</span>
  </button>
  <button class="nav-btn" id="nav-records" onclick="switchTab('records')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
      <line x1="10" y1="9" x2="8" y2="9"/>
    </svg>
    <span>紀錄</span>
  </button>
</div>

<!-- ADD/EDIT SHEET -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">新增費用紀錄</div>
    <div class="sheet-field">
      <div class="sheet-lbl">費用說明 *</div>
      <input class="sheet-inp" id="inpDesc" type="text" placeholder="例：午餐、計程車、伴手禮…">
    </div>
    <div class="sheet-field">
      <div class="sheet-lbl">日期</div>
      <input class="sheet-inp" id="inpDate" type="date">
    </div>
    <div class="sheet-field">
      <div class="sheet-lbl">地點（選填）</div>
      <input class="sheet-inp" id="inpLoc" type="text" placeholder="例：東京、首爾、曼谷…">
    </div>
    <div class="sheet-field">
      <div class="sheet-lbl">金額</div>
      <div class="amount-preview" id="previewAmt">—</div>
    </div>
    <div class="sheet-actions">
      <button class="sh-cancel" onclick="closeSheet()">取消</button>
      <button class="sh-confirm" id="confirmBtn" onclick="confirmRecord()">確認記錄</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════
const CURRENCIES = [
  { code:'USD', name:'美元', flag:'🇺🇸', sym:'$',    decimals:2 },
  { code:'JPY', name:'日圓', flag:'🇯🇵', sym:'¥',    decimals:0 },
  { code:'EUR', name:'歐元', flag:'🇪🇺', sym:'€',    decimals:2 },
  { code:'KRW', name:'韓圓', flag:'🇰🇷', sym:'₩',    decimals:0 },
  { code:'GBP', name:'英鎊', flag:'🇬🇧', sym:'£',    decimals:2 },
  { code:'HKD', name:'港幣', flag:'🇭🇰', sym:'HK$',  decimals:2 },
  { code:'CNY', name:'人民幣',flag:'🇨🇳',sym:'¥',    decimals:2 },
  { code:'SGD', name:'新幣', flag:'🇸🇬', sym:'S$',   decimals:2 },
  { code:'AUD', name:'澳幣', flag:'🇦🇺', sym:'A$',   decimals:2 },
  { code:'THB', name:'泰銖', flag:'🇹🇭', sym:'฿',    decimals:2 },
  { code:'MYR', name:'馬幣', flag:'🇲🇾', sym:'RM',   decimals:2 },
  { code:'VND', name:'越南盾',flag:'🇻🇳',sym:'₫',    decimals:0 },
];

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let s = {
  currency: localStorage.getItem('last_currency') || 'USD',
  rate: null,
  foreignStr: '0',
  twdStr: '0',
  active: 'foreign',   // 'foreign' | 'twd'
  editId: null,
};

let records = JSON.parse(localStorage.getItem('ex_records') || '[]');

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
function init() {
  buildChips();
  fetchRate();
  renderRecords();
  document.getElementById('inpDate').value = todayStr();
}

function todayStr() {
  return new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD
}

function currObj() { return CURRENCIES.find(c => c.code === s.currency); }

// ═══════════════════════════════════════════
//  CURRENCY CHIPS
// ═══════════════════════════════════════════
function buildChips() {
  const wrap = document.getElementById('chipScroll');
  wrap.innerHTML = CURRENCIES.map(c => `
    <div class="chip ${c.code === s.currency ? 'active' : ''}" onclick="pickCurrency('${c.code}')">
      <span class="flag">${c.flag}</span>
      <span class="code">${c.code}</span>
      <span class="name">${c.name}</span>
    </div>
  `).join('');

  // Scroll active chip into view
  setTimeout(() => {
    const activeChip = wrap.querySelector('.chip.active');
    if (activeChip) activeChip.scrollIntoView({ inline: 'center', block: 'nearest' });
  }, 50);
}

function pickCurrency(code) {
  s.currency = code;
  s.foreignStr = '0';
  s.twdStr = '0';
  s.rate = null;
  localStorage.setItem('last_currency', code);
  buildChips();
  updateDisplays();
  fetchRate();
}

// ═══════════════════════════════════════════
//  EXCHANGE RATE
// ═══════════════════════════════════════════
async function fetchRate() {
  const btn = document.getElementById('refreshBtn');
  btn.innerHTML = '<span class="spinning">↻</span>';
  document.getElementById('updateBadge').textContent = '更新中…';
  try {
    const res = await fetch(`https://open.er-api.com/v6/latest/${s.currency}`);
    const data = await res.json();
    if (data.result === 'success' && data.rates && data.rates.TWD) {
      s.rate = data.rates.TWD;
      document.getElementById('rateInput').value = s.rate.toFixed(4);
      document.getElementById('rateUnit').textContent = `TWD / ${s.currency}`;
      const t = new Date();
      const hh = t.getHours().toString().padStart(2,'0');
      const mm = t.getMinutes().toString().padStart(2,'0');
      document.getElementById('updateBadge').textContent = `${hh}:${mm} 已更新`;
      recompute();
    } else {
      throw new Error('no TWD rate');
    }
  } catch(e) {
    document.getElementById('updateBadge').textContent = '更新失敗';
    document.getElementById('rateInput').placeholder = '請手動輸入';
  } finally {
    btn.innerHTML = '↻';
  }
}

document.getElementById('rateInput').addEventListener('input', function() {
  s.rate = parseFloat(this.value) || null;
  recompute();
});

// ═══════════════════════════════════════════
//  NUMPAD
// ═══════════════════════════════════════════
function setActive(field) {
  s.active = field;
  document.getElementById('foreignField').classList.toggle('active-field', field === 'foreign');
  document.getElementById('twdField').classList.toggle('active-field', field === 'twd');
}

function pad(ch) {
  let val = s.active === 'foreign' ? s.foreignStr : s.twdStr;

  if (ch === '.') {
    if (val.includes('.')) return;
    if (val === '0') { val = '0'; }
    val += '.';
  } else if (ch === '0') {
    if (val === '0') return;
    val += '0';
  } else {
    if (val === '0') val = '';
    val += ch;
  }

  // Reasonable max length
  if (val.replace('.', '').length > 12) return;

  if (s.active === 'foreign') s.foreignStr = val;
  else s.twdStr = val;

  recompute();
}

function backspace() {
  let val = s.active === 'foreign' ? s.foreignStr : s.twdStr;
  val = val.length <= 1 ? '0' : val.slice(0, -1);
  if (val.endsWith('.')) val = val.slice(0, -1) || '0';
  if (s.active === 'foreign') s.foreignStr = val;
  else s.twdStr = val;
  recompute();
}

function clearAll() {
  s.foreignStr = '0';
  s.twdStr = '0';
  updateDisplays();
}

// ═══════════════════════════════════════════
//  COMPUTE
// ═══════════════════════════════════════════
function recompute() {
  if (!s.rate) { updateDisplays(); return; }
  if (s.active === 'foreign') {
    const f = parseFloat(s.foreignStr) || 0;
    const twd = f * s.rate;
    s.twdStr = twd === 0 ? '0' : twd.toFixed(2);
  } else {
    const t = parseFloat(s.twdStr) || 0;
    const foreign = t / s.rate;
    const c = currObj();
    s.foreignStr = foreign === 0 ? '0' : foreign.toFixed(c.decimals === 0 ? 2 : c.decimals);
  }
  updateDisplays();
}

// ═══════════════════════════════════════════
//  DISPLAY
// ═══════════════════════════════════════════
function updateDisplays() {
  const c = currObj();
  document.getElementById('foreignCurrLabel').textContent = s.currency;
  document.getElementById('foreignCurrTag').textContent = s.currency;

  const fv = parseFloat(s.foreignStr) || 0;
  const fDisp = document.getElementById('foreignDisplay');
  fDisp.textContent = fmtNum(s.foreignStr, c);
  fDisp.classList.toggle('dim', fv === 0 && !s.foreignStr.endsWith('.'));

  const tv = parseFloat(s.twdStr) || 0;
  const tDisp = document.getElementById('twdDisplay');
  tDisp.textContent = 'NT$' + fmtNum(s.twdStr, { decimals: 0 });
  tDisp.classList.toggle('dim', tv === 0 && !s.twdStr.endsWith('.'));
}

function fmtNum(str, curr) {
  if (str === '0' || str === '') return '0';
  if (str.endsWith('.')) {
    const n = parseInt(str) || 0;
    return n.toLocaleString() + '.';
  }
  const dotIdx = str.indexOf('.');
  if (dotIdx !== -1) {
    const intPart = parseInt(str.slice(0, dotIdx)) || 0;
    const decPart = str.slice(dotIdx + 1);
    return intPart.toLocaleString() + '.' + decPart;
  }
  const n = parseFloat(str) || 0;
  if (curr.decimals === 0) return Math.round(n).toLocaleString();
  return n.toLocaleString('en', { maximumFractionDigits: 4, minimumFractionDigits: 0 });
}

// ═══════════════════════════════════════════
//  TAB NAV
// ═══════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
  if (tab === 'records') renderRecords();
}

// ═══════════════════════════════════════════
//  ADD RECORD SHEET
// ═══════════════════════════════════════════
function openSheet() {
  const fv = parseFloat(s.foreignStr) || 0;
  if (fv === 0) { showToast('請先輸入外幣金額'); return; }
  if (!s.rate) { showToast('請先取得或輸入匯率'); return; }

  s.editId = null;
  document.getElementById('sheetTitle').textContent = '新增費用紀錄';
  document.getElementById('inpDesc').value = '';
  document.getElementById('inpDate').value = todayStr();
  document.getElementById('inpLoc').value = '';
  document.getElementById('confirmBtn').textContent = '確認記錄';

  const c = currObj();
  const twd = parseFloat(s.twdStr) || 0;
  document.getElementById('previewAmt').innerHTML =
    `<strong>${c.sym}${fmtNum(s.foreignStr, c)} ${s.currency}</strong>&nbsp;＝&nbsp;<strong>NT$${Math.round(twd).toLocaleString()}</strong>`;

  document.getElementById('overlay').classList.add('show');
  setTimeout(() => document.getElementById('inpDesc').focus(), 300);
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('show');
}

function confirmRecord() {
  const desc = document.getElementById('inpDesc').value.trim();
  if (!desc) { document.getElementById('inpDesc').focus(); showToast('請輸入費用說明'); return; }

  const date = document.getElementById('inpDate').value || todayStr();
  const loc = document.getElementById('inpLoc').value.trim();

  if (s.editId !== null) {
    const idx = records.findIndex(r => r.id === s.editId);
    if (idx !== -1) {
      records[idx] = { ...records[idx], description: desc, date, location: loc };
    }
    showToast('已更新紀錄 ✓');
  } else {
    const c = currObj();
    records.unshift({
      id: Date.now(),
      date,
      description: desc,
      location: loc,
      currency: s.currency,
      currSym: c.sym,
      currDec: c.decimals,
      foreignAmount: parseFloat(s.foreignStr),
      rate: s.rate,
      twdAmount: parseFloat(s.twdStr) || 0,
    });
    showToast('已記錄 ✓');
  }

  saveRecords();
  closeSheet();
  switchTab('records');
}

// ═══════════════════════════════════════════
//  RECORDS CRUD
// ═══════════════════════════════════════════
function saveRecords() { localStorage.setItem('ex_records', JSON.stringify(records)); }

function renderRecords() {
  const list = document.getElementById('recordsList');

  if (records.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <p>尚無費用紀錄<br>換算金額後點「加入紀錄」</p>
      </div>`;
  } else {
    list.innerHTML = records.map(r => `
      <div class="rec-card" id="r${r.id}">
        <div class="rec-top">
          <div class="rec-desc">${esc(r.description)}</div>
          <div class="rec-actions">
            <button class="rec-action" onclick="editRecord(${r.id})" title="修改">✏️</button>
            <button class="rec-action" onclick="deleteRecord(${r.id})" title="刪除">🗑️</button>
          </div>
        </div>
        <div class="rec-meta">
          <span>📅 ${fmtDate(r.date)}</span>
          ${r.location ? `<span>📍 ${esc(r.location)}</span>` : ''}
          <span class="rec-currency-tag">${r.currency}</span>
        </div>
        <div class="rec-amounts">
          <span class="rec-foreign">${r.currSym}${fmtForeign(r.foreignAmount, r.currDec)}</span>
          <span class="rec-arrow">→</span>
          <span class="rec-twd">NT$${Math.round(r.twdAmount).toLocaleString()}</span>
        </div>
      </div>
    `).join('');
  }

  const total = records.reduce((s, r) => s + (r.twdAmount || 0), 0);
  document.getElementById('totalAmount').textContent = 'NT$' + Math.round(total).toLocaleString();
  document.getElementById('totalCount').textContent = `共 ${records.length} 筆`;
}

function fmtForeign(n, dec) {
  if (dec === 0) return Math.round(n).toLocaleString();
  return n.toLocaleString('en', { maximumFractionDigits: 2, minimumFractionDigits: 0 });
}

function editRecord(id) {
  const r = records.find(r => r.id === id);
  if (!r) return;

  s.editId = id;
  document.getElementById('sheetTitle').textContent = '修改費用紀錄';
  document.getElementById('inpDesc').value = r.description;
  document.getElementById('inpDate').value = r.date;
  document.getElementById('inpLoc').value = r.location || '';
  document.getElementById('confirmBtn').textContent = '儲存修改';
  document.getElementById('previewAmt').innerHTML =
    `<strong>${r.currSym}${fmtForeign(r.foreignAmount, r.currDec)} ${r.currency}</strong>&nbsp;＝&nbsp;<strong>NT$${Math.round(r.twdAmount).toLocaleString()}</strong>`;

  document.getElementById('overlay').classList.add('show');
  setTimeout(() => document.getElementById('inpDesc').focus(), 300);
}

function deleteRecord(id) {
  if (!confirm('確定要刪除這筆紀錄嗎？')) return;
  records = records.filter(r => r.id !== id);
  saveRecords();

  // Animate out
  const el = document.getElementById('r' + id);
  if (el) {
    el.style.transition = 'opacity 0.2s, transform 0.2s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(30px)';
    setTimeout(() => renderRecords(), 200);
  } else {
    renderRecords();
  }
  showToast('已刪除');
}

function clearAllRecords() {
  if (records.length === 0) { showToast('目前沒有紀錄'); return; }
  if (!confirm(`確定要清除全部 ${records.length} 筆紀錄嗎？`)) return;
  records = [];
  saveRecords();
  renderRecords();
  showToast('已清除所有紀錄');
}

// ═══════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════
function fmtDate(str) {
  if (!str) return '';
  const [y, m, d] = str.split('-');
  return `${y}/${m}/${d}`;
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// Close sheet on backdrop tap
document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeSheet();
});

// ═══════════════════════════════════════════
//  START
// ═══════════════════════════════════════════
init();
updateDisplays();
</script>
</body>
</html>
