<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#8FBEB8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="換匯計算機" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>即時換匯計算機</title>

  <style>
    :root {
      --bg1: #fbfaf6;
      --bg2: #eef6f3;
      --card: rgba(255, 255, 255, .88);
      --text: #344443;
      --muted: #7b8d8b;
      --line: #d9e5e1;
      --mint: #8fbeb8;
      --mint-deep: #4f9b96;
      --mint-soft: #edf7f5;
      --yellow: #f3cd66;
      --yellow-soft: #fff4cc;
      --danger: #e97878;
      --shadow: 0 16px 34px rgba(118, 158, 151, .16);
      --radius-xl: 26px;
      --radius-lg: 18px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(243, 205, 102, .2), transparent 28%),
        radial-gradient(circle at top right, rgba(143, 190, 184, .28), transparent 30%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      overscroll-behavior: none;
    }

    body {
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(100%, 540px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 16px 13px 28px;
    }

    .hero {
      padding: 8px 4px 6px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: .4px;
      color: #3d4d4b;
    }

    .card {
      margin: 12px 0;
      padding: 15px;
      border-radius: var(--radius-xl);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, .8);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 11px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 17px;
      color: #40504f;
    }

    .small-text {
      color: var(--muted);
      font-size: 12px;
    }

    .field {
      margin-bottom: 11px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, .9);
      color: var(--text);
      padding: 12px 13px;
      outline: none;
      transition: .18s ease;
    }

    input:focus,
    select:focus {
      border-color: #9bc9c4;
      box-shadow: 0 0 0 4px rgba(143, 190, 184, .16);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .rate-inline {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .ghost-btn,
    .main-btn,
    .danger-btn,
    .mini-btn {
      border-radius: 16px;
      font-weight: 800;
      transition: transform .12s ease, opacity .12s ease;
    }

    .ghost-btn:active,
    .main-btn:active,
    .danger-btn:active,
    .mini-btn:active,
    .key:active {
      transform: scale(.97);
    }

    .ghost-btn {
      padding: 12px 13px;
      color: var(--mint-deep);
      background: var(--mint-soft);
      white-space: nowrap;
    }

    .main-btn {
      width: 100%;
      padding: 13px 14px;
      color: #fff;
      background: linear-gradient(180deg, #9ccdc7, var(--mint));
      box-shadow: 0 10px 20px rgba(143, 190, 184, .22);
    }

    .danger-btn {
      padding: 11px 12px;
      color: var(--danger);
      background: #fff2f2;
    }

    .mini-btn {
      padding: 6px 9px;
      font-size: 12px;
      color: var(--mint-deep);
      background: #edf7f5;
    }

    .mini-btn.danger {
      color: var(--danger);
      background: #fff3f3;
    }

    .amount-input {
      min-height: 55px;
      font-size: 24px;
      font-weight: 900;
      text-align: right;
      letter-spacing: .3px;
      background: #fbfdfc;
    }

    .amount-input.active {
      border-color: var(--mint);
      box-shadow: 0 0 0 4px rgba(143, 190, 184, .18);
      background: #ffffff;
    }

    .expression-hint {
      min-height: 17px;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .calc-frame {
      margin-top: 3px;
      padding: 10px;
      border: 1px solid #d5e1dd;
      border-radius: 22px;
      background: linear-gradient(180deg, #eef3f1, #eaf1ee);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .8);
    }

    .calculator {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      user-select: none;
    }

    .key {
      min-height: 45px;
      border-radius: 14px;
      border: 1px solid rgba(0, 0, 0, .06);
      color: #43504f;
      font-size: 20px;
      font-weight: 900;
      background: linear-gradient(180deg, #ffffff, #f2f2f2);
      box-shadow: 0 4px 0 rgba(127, 185, 179, .2);
    }

    .key.top {
      background: linear-gradient(180deg, #f8d979, var(--yellow));
      box-shadow: 0 4px 0 rgba(216, 179, 76, .35);
    }

    .key.op,
    .key.equal {
      color: #fff;
      background: linear-gradient(180deg, #69bbb6, #55aaa6);
      box-shadow: 0 4px 0 rgba(74, 145, 142, .38);
    }

    .key.zero {
      grid-column: span 2;
    }

    .record-form {
      display: grid;
      gap: 9px;
    }

    .record-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .total-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 13px;
      margin-top: 11px;
      border: 1px solid #dce9e5;
      border-radius: 19px;
      background: linear-gradient(180deg, #f8fcfb, #eef8f6);
    }

    .total-box .amount {
      color: var(--mint-deep);
      font-size: 22px;
      font-weight: 900;
    }

    .record-list {
      display: grid;
      gap: 9px;
      margin-top: 11px;
    }

    .record-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
      padding: 12px;
      border: 1px solid #e2ece8;
      border-radius: 19px;
      background: rgba(255, 255, 255, .9);
      box-shadow: 0 8px 18px rgba(120, 182, 176, .08);
    }

    .record-main {
      min-width: 0;
    }

    .record-top {
      display: flex;
      gap: 7px;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .record-name {
      font-size: 15px;
      font-weight: 900;
      line-height: 1.35;
      word-break: break-word;
    }

    .record-date {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .record-money {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .record-money strong {
      color: var(--text);
      font-size: 16px;
    }

    .record-location {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .record-buttons {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 44px;
    }

    .empty {
      padding: 17px 8px;
      border: 1px dashed #d7e5e0;
      border-radius: 18px;
      background: rgba(255, 255, 255, .7);
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + var(--safe-bottom));
      width: calc(100% - 30px);
      max-width: 480px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(52, 68, 67, .92);
      color: #fff;
      opacity: 0;
      pointer-events: none;
      text-align: center;
      transform: translateX(-50%) translateY(20px);
      transition: .22s ease;
      z-index: 20;
      font-size: 14px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .footer-note {
      padding: 4px 8px 0;
      color: var(--muted);
      font-size: 10.5px;
      line-height: 1.55;
      text-align: center;
    }

    @media (max-width: 390px) {
      .app { padding: 14px 11px 26px; }
      h1 { font-size: 26px; }
      .card { padding: 14px; }
      .amount-input { min-height: 52px; font-size: 22px; }
      .key { min-height: 42px; font-size: 19px; border-radius: 13px; }
      .calc-frame { padding: 9px; }
      .calculator { gap: 6px; }
    }

    @media (max-width: 350px) {
      .grid-2 { grid-template-columns: 1fr; }
      .record-actions { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="hero">
      <h1>即時換匯<br>計算機</h1>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>匯率設定</h2>
        <span class="small-text" id="lastUpdated">尚未更新</span>
      </div>

      <div class="field">
        <div class="label-row">
          <label for="currencySelect">幣別</label>
          <span>1 外幣 = 幾元台幣</span>
        </div>
        <select id="currencySelect"></select>
      </div>

      <div class="field">
        <div class="label-row">
          <label for="rateInput">即期匯率 / 手動匯率</label>
          <span id="manualHint">可修改</span>
        </div>
        <div class="rate-inline">
          <input id="rateInput" inputmode="decimal" type="number" step="0.0001" min="0" placeholder="例如 0.2200" />
          <button class="ghost-btn" id="refreshRateBtn" type="button">更新</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>金額換算</h2>
        <span class="small-text">自動四捨五入</span>
      </div>

      <div class="field">
        <div class="label-row">
          <label for="foreignAmount">外幣金額</label>
          <span id="foreignCodeLabel">JPY</span>
        </div>
        <input class="amount-input active" id="foreignAmount" type="text" inputmode="none" readonly placeholder="0" />
        <div class="expression-hint" id="foreignHint"></div>
      </div>

      <div class="field">
        <div class="label-row">
          <label for="twdAmount">台幣金額</label>
          <span>TWD</span>
        </div>
        <input class="amount-input" id="twdAmount" type="text" inputmode="none" readonly placeholder="0" />
        <div class="expression-hint" id="twdHint"></div>
      </div>

      <div class="calc-frame">
        <div class="calculator" aria-label="小型計算機">
          <button class="key top" data-key="AC" type="button">C</button>
          <button class="key top" data-key="DEL" type="button">←</button>
          <button class="key top" data-key="%" type="button">%</button>
          <button class="key op" data-key="/" type="button">÷</button>

          <button class="key" data-key="7" type="button">7</button>
          <button class="key" data-key="8" type="button">8</button>
          <button class="key" data-key="9" type="button">9</button>
          <button class="key op" data-key="*" type="button">×</button>

          <button class="key" data-key="4" type="button">4</button>
          <button class="key" data-key="5" type="button">5</button>
          <button class="key" data-key="6" type="button">6</button>
          <button class="key op" data-key="-" type="button">−</button>

          <button class="key" data-key="1" type="button">1</button>
          <button class="key" data-key="2" type="button">2</button>
          <button class="key" data-key="3" type="button">3</button>
          <button class="key op" data-key="+" type="button">＋</button>

          <button class="key zero" data-key="0" type="button">0</button>
          <button class="key" data-key="." type="button">.</button>
          <button class="key equal" data-key="=" type="button">＝</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>費用紀錄</h2>
        <button class="danger-btn" id="clearAllBtn" type="button">全部清除</button>
      </div>

      <div class="record-form">
        <div class="grid-2">
          <div class="field" style="margin-bottom:0;">
            <div class="label-row"><label for="recordDate">日期</label></div>
            <input id="recordDate" type="date" />
          </div>

          <div class="field" style="margin-bottom:0;">
            <div class="label-row"><label for="recordPlace">地點</label></div>
            <input id="recordPlace" type="text" placeholder="可空白" />
          </div>
        </div>

        <div class="field" style="margin-bottom:0;">
          <div class="label-row"><label for="recordName">這筆是什麼費用？</label></div>
          <input id="recordName" type="text" placeholder="例如：餐費、交通、伴手禮" />
        </div>

        <div class="record-actions">
          <button class="main-btn" id="saveRecordBtn" type="button">新增紀錄</button>
          <button class="ghost-btn" id="cancelEditBtn" type="button" style="display:none;">取消修改</button>
        </div>
      </div>

      <div class="total-box">
        <div>
          <div class="small-text">目前總計</div>
          <div class="amount" id="totalTwd">NT$ 0</div>
        </div>
        <div class="small-text" id="totalCount">0 筆</div>
      </div>

      <div class="record-list" id="recordList"></div>
    </section>

    <div class="footer-note">
      匯率來源：ExchangeRate-API Open Access。實際刷卡、銀行現鈔與手續費可能不同。
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const currencies = [
      { code: "JPY", name: "日圓", emoji: "🇯🇵" },
      { code: "USD", name: "美元", emoji: "🇺🇸" },
      { code: "KRW", name: "韓元", emoji: "🇰🇷" },
      { code: "HKD", name: "港幣", emoji: "🇭🇰" },
      { code: "CNY", name: "人民幣", emoji: "🇨🇳" },
      { code: "THB", name: "泰銖", emoji: "🇹🇭" },
      { code: "EUR", name: "歐元", emoji: "🇪🇺" },
      { code: "GBP", name: "英鎊", emoji: "🇬🇧" },
      { code: "SGD", name: "新加坡幣", emoji: "🇸🇬" },
      { code: "AUD", name: "澳幣", emoji: "🇦🇺" },
      { code: "CAD", name: "加幣", emoji: "🇨🇦" },
      { code: "MYR", name: "馬幣", emoji: "🇲🇾" },
      { code: "VND", name: "越南盾", emoji: "🇻🇳" },
      { code: "PHP", name: "菲律賓披索", emoji: "🇵🇭" }
    ];

    const STORAGE_KEY = "mobileExchangeRecords_v3";
    const SETTING_KEY = "mobileExchangeSettings_v3";
    const RATE_CACHE_KEY = "mobileExchangeRateCache_v3";

    const $ = (id) => document.getElementById(id);

    const currencySelect = $("currencySelect");
    const rateInput = $("rateInput");
    const refreshRateBtn = $("refreshRateBtn");
    const lastUpdated = $("lastUpdated");
    const manualHint = $("manualHint");
    const foreignCodeLabel = $("foreignCodeLabel");
    const foreignAmount = $("foreignAmount");
    const twdAmount = $("twdAmount");
    const foreignHint = $("foreignHint");
    const twdHint = $("twdHint");
    const recordDate = $("recordDate");
    const recordPlace = $("recordPlace");
    const recordName = $("recordName");
    const saveRecordBtn = $("saveRecordBtn");
    const cancelEditBtn = $("cancelEditBtn");
    const clearAllBtn = $("clearAllBtn");
    const recordList = $("recordList");
    const totalTwd = $("totalTwd");
    const totalCount = $("totalCount");
    const toast = $("toast");

    let activeInput = "foreign";
    let expression = "";
    let records = [];
    let editingId = null;
    let settings = {
      currency: "JPY",
      rate: "",
      lastMode: "foreign"
    };

    function todayString() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    }

    function formatNumber(num) {
      if (!Number.isFinite(num)) return "0";
      return Math.round(num).toLocaleString("zh-TW");
    }

    function parseDisplayNumber(value) {
      if (!value) return 0;
      const num = Number(String(value).replace(/,/g, ""));
      return Number.isFinite(num) ? num : 0;
    }

    function normalizeNumberString(num) {
      if (!Number.isFinite(num)) return "";
      return String(Math.round(num * 100000) / 100000);
    }

    function moneyTwd(num) {
      return `NT$ ${formatNumber(num)}`;
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1700);
    }

    function saveSettings() {
      settings.currency = currencySelect.value;
      settings.rate = rateInput.value;
      settings.lastMode = activeInput;
      localStorage.setItem(SETTING_KEY, JSON.stringify(settings));
    }

    function loadSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(SETTING_KEY));
        if (saved) settings = { ...settings, ...saved };
      } catch (e) {}
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function loadRecords() {
      try {
        records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch (e) {
        records = [];
      }
    }

    function initCurrencyOptions() {
      currencySelect.innerHTML = currencies.map(c => (
        `<option value="${c.code}">${c.emoji} ${c.name} ${c.code}</option>`
      )).join("");
    }

    function updateCurrencyUI() {
      foreignCodeLabel.textContent = currencySelect.value;
    }

    function getRateCache() {
      try {
        return JSON.parse(localStorage.getItem(RATE_CACHE_KEY)) || {};
      } catch (e) {
        return {};
      }
    }

    function setRateCache(cache) {
      localStorage.setItem(RATE_CACHE_KEY, JSON.stringify(cache));
    }

    async function fetchRate(code, force = false) {
      updateCurrencyUI();

      const cache = getRateCache();
      const cached = cache[code];
      const now = Date.now();
      const oneHour = 60 * 60 * 1000;

      if (!force && cached && now - cached.fetchedAt < oneHour) {
        rateInput.value = cached.rate;
        lastUpdated.textContent = cached.date ? `匯率日期：${cached.date}` : "已載入";
        refreshComputedAmounts();
        saveSettings();
        return;
      }

      refreshRateBtn.disabled = true;
      refreshRateBtn.textContent = "更新中";

      try {
        const res = await fetch(`https://open.er-api.com/v6/latest/${encodeURIComponent(code)}`);
        if (!res.ok) throw new Error("rate api error");

        const data = await res.json();
        const rate = data && data.rates ? data.rates.TWD : null;
        if (!rate) throw new Error("no twd rate");

        const roundedRate = Number(rate).toFixed(rate < 1 ? 5 : 4);
        const dateText = data.time_last_update_utc ? new Date(data.time_last_update_utc).toLocaleDateString("zh-TW") : "";

        rateInput.value = roundedRate;
        cache[code] = { rate: roundedRate, date: dateText, fetchedAt: now };
        setRateCache(cache);

        lastUpdated.textContent = dateText ? `匯率日期：${dateText}` : "已更新";
        manualHint.textContent = "可修改";
        refreshComputedAmounts();
        saveSettings();
      } catch (err) {
        if (cached && cached.rate) {
          rateInput.value = cached.rate;
          lastUpdated.textContent = "使用上次匯率";
          refreshComputedAmounts();
        } else {
          lastUpdated.textContent = "更新失敗";
          showToast("抓不到匯率，請手動輸入");
        }
      } finally {
        refreshRateBtn.disabled = false;
        refreshRateBtn.textContent = "更新";
      }
    }

    function getRate() {
      const rate = Number(rateInput.value);
      return Number.isFinite(rate) && rate > 0 ? rate : 0;
    }

    function safeEval(expr) {
      if (!expr) return 0;
      let cleaned = String(expr).replace(/,/g, "");

      if (!/^[0-9+\-*/. ()]+$/.test(cleaned)) return 0;
      while (/[+\-*/.]$/.test(cleaned)) cleaned = cleaned.slice(0, -1);
      if (!cleaned) return 0;

      try {
        const result = Function(`"use strict"; return (${cleaned})`)();
        return Number.isFinite(result) ? result : 0;
      } catch (e) {
        return 0;
      }
    }

    function setActiveInput(type) {
      activeInput = type;
      expression = type === "foreign"
        ? String(parseDisplayNumber(foreignAmount.value) || "")
        : String(parseDisplayNumber(twdAmount.value) || "");

      foreignAmount.classList.toggle("active", type === "foreign");
      twdAmount.classList.toggle("active", type === "twd");
      updateHints();
      saveSettings();
    }

    function getActiveValue() {
      if (expression) return safeEval(expression);
      return activeInput === "foreign"
        ? parseDisplayNumber(foreignAmount.value)
        : parseDisplayNumber(twdAmount.value);
    }

    function updateHints() {
      foreignHint.textContent = activeInput === "foreign" && /[+\-*/]/.test(expression) ? `算式：${expression}` : "";
      twdHint.textContent = activeInput === "twd" && /[+\-*/]/.test(expression) ? `算式：${expression}` : "";
    }

    function refreshComputedAmounts() {
      const rate = getRate();
      const value = getActiveValue();

      if (!value) {
        if (activeInput === "foreign") {
          if (!expression) foreignAmount.value = "";
          twdAmount.value = "";
        } else {
          if (!expression) twdAmount.value = "";
          foreignAmount.value = "";
        }
        updateHints();
        return;
      }

      if (activeInput === "foreign") {
        foreignAmount.value = expression || formatNumber(value);
        twdAmount.value = rate ? formatNumber(value * rate) : "";
      } else {
        twdAmount.value = expression || formatNumber(value);
        foreignAmount.value = rate ? formatNumber(value / rate) : "";
      }

      updateHints();
    }

    function clearCalculator() {
      expression = "";
      foreignAmount.value = "";
      twdAmount.value = "";
      updateHints();
    }

    function handleCalcKey(key) {
      const operators = ["+", "-", "*", "/"];
      const last = expression.slice(-1);

      if (key === "AC") {
        clearCalculator();
        return;
      }

      if (key === "DEL") {
        expression = expression.slice(0, -1);
        refreshComputedAmounts();
        return;
      }

      if (key === "%") {
        if (!expression) return;
        const value = safeEval(expression);
        expression = value ? normalizeNumberString(value / 100) : "";
        refreshComputedAmounts();
        return;
      }

      if (key === "=") {
        const result = safeEval(expression);
        expression = result ? normalizeNumberString(result) : "";
        refreshComputedAmounts();
        expression = "";
        return;
      }

      if (operators.includes(key)) {
        if (!expression) {
          expression = activeInput === "foreign"
            ? String(parseDisplayNumber(foreignAmount.value) || "")
            : String(parseDisplayNumber(twdAmount.value) || "");
        }
        if (!expression) return;
        if (operators.includes(last)) expression = expression.slice(0, -1);
        expression += key;
        refreshComputedAmounts();
        return;
      }

      if (key === ".") {
        const parts = expression.split(/[+\-*/]/);
        const current = parts[parts.length - 1];
        if (current.includes(".")) return;
        if (!expression || operators.includes(last)) expression += "0";
      }

      expression += key;
      refreshComputedAmounts();
    }

    function currentAmounts() {
      const rate = getRate();
      const activeValue = getActiveValue();

      let foreign = activeInput === "foreign" ? activeValue : (rate ? activeValue / rate : 0);
      let twd = activeInput === "twd" ? activeValue : (rate ? activeValue * rate : 0);

      return {
        foreign: Math.round(foreign || 0),
        twd: Math.round(twd || 0),
        rate
      };
    }

    function resetRecordForm() {
      editingId = null;
      recordName.value = "";
      recordPlace.value = "";
      recordDate.value = todayString();
      saveRecordBtn.textContent = "新增紀錄";
      cancelEditBtn.style.display = "none";
    }

    function saveCurrentRecord() {
      const { foreign, twd, rate } = currentAmounts();
      const name = recordName.value.trim();

      if (!foreign && !twd) {
        showToast("請先輸入金額");
        return;
      }

      if (!name) {
        showToast("請輸入費用名稱");
        return;
      }

      if (!rate) {
        showToast("請先輸入匯率");
        return;
      }

      const item = {
        id: editingId || String(Date.now()),
        date: recordDate.value || todayString(),
        name,
        place: recordPlace.value.trim(),
        currency: currencySelect.value,
        rate,
        foreign,
        twd,
        createdAt: editingId ? (records.find(r => r.id === editingId)?.createdAt || Date.now()) : Date.now()
      };

      if (editingId) {
        records = records.map(r => r.id === editingId ? item : r);
        showToast("已修改");
      } else {
        records.unshift(item);
        showToast("已新增");
      }

      saveRecords();
      renderRecords();
      resetRecordForm();
    }

    function editRecord(id) {
      const item = records.find(r => r.id === id);
      if (!item) return;

      editingId = id;
      currencySelect.value = item.currency;
      rateInput.value = item.rate;
      recordDate.value = item.date;
      recordName.value = item.name;
      recordPlace.value = item.place || "";
      foreignAmount.value = formatNumber(item.foreign);
      twdAmount.value = formatNumber(item.twd);
      expression = "";
      saveRecordBtn.textContent = "儲存修改";
      cancelEditBtn.style.display = "block";

      setActiveInput("foreign");
      updateCurrencyUI();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteRecord(id) {
      records = records.filter(r => r.id !== id);
      saveRecords();
      renderRecords();
      showToast("已刪除");
    }

    function clearAllRecords() {
      if (!records.length) {
        showToast("目前沒有紀錄");
        return;
      }

      if (!confirm("確定要清除全部紀錄嗎？這個動作無法復原。")) return;

      records = [];
      saveRecords();
      renderRecords();
      showToast("已清除");
    }

    function renderRecords() {
      const total = records.reduce((sum, item) => sum + Number(item.twd || 0), 0);
      totalTwd.textContent = moneyTwd(total);
      totalCount.textContent = `${records.length} 筆`;

      if (!records.length) {
        recordList.innerHTML = `<div class="empty">還沒有紀錄，輸入金額後按「新增紀錄」就會保存在本機裡。</div>`;
        return;
      }

      recordList.innerHTML = records.map(item => `
        <article class="record-item">
          <div class="record-main">
            <div class="record-top">
              <div class="record-name">${escapeHtml(item.name)}</div>
              <div class="record-date">${escapeHtml(item.date)}</div>
            </div>

            <div class="record-money">
              <strong>${formatNumber(item.foreign)}</strong> ${escapeHtml(item.currency)}
              ≈ <strong>${moneyTwd(item.twd)}</strong>
            </div>

            ${item.place ? `<div class="record-location">地點：${escapeHtml(item.place)}</div>` : ""}
          </div>

          <div class="record-buttons">
            <button class="mini-btn" type="button" onclick="editRecord('${item.id}')">改</button>
            <button class="mini-btn danger" type="button" onclick="deleteRecord('${item.id}')">刪</button>
          </div>
        </article>
      `).join("");
    }

    function bindEvents() {
      currencySelect.addEventListener("change", () => fetchRate(currencySelect.value, false));
      refreshRateBtn.addEventListener("click", () => fetchRate(currencySelect.value, true));

      rateInput.addEventListener("input", () => {
        manualHint.textContent = "手動";
        refreshComputedAmounts();
        saveSettings();
      });

      foreignAmount.addEventListener("click", () => setActiveInput("foreign"));
      foreignAmount.addEventListener("focus", () => setActiveInput("foreign"));
      twdAmount.addEventListener("click", () => setActiveInput("twd"));
      twdAmount.addEventListener("focus", () => setActiveInput("twd"));

      document.querySelector(".calculator").addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-key]");
        if (!btn) return;
        handleCalcKey(btn.dataset.key);
      });

      saveRecordBtn.addEventListener("click", saveCurrentRecord);
      cancelEditBtn.addEventListener("click", resetRecordForm);
      clearAllBtn.addEventListener("click", clearAllRecords);
    }

    function registerServiceWorker() {
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    }

    function init() {
      loadSettings();
      loadRecords();
      initCurrencyOptions();

      currencySelect.value = settings.currency || "JPY";
      rateInput.value = settings.rate || "";
      activeInput = settings.lastMode || "foreign";
      recordDate.value = todayString();

      updateCurrencyUI();
      bindEvents();
      renderRecords();
      setActiveInput(activeInput);

      fetchRate(currencySelect.value, false);
      registerServiceWorker();
    }

    window.editRecord = editRecord;
    window.deleteRecord = deleteRecord;

    init();
  </script>
</body>
</html>
