<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幸福家代銷部 - 獎金管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #F9F7F2;
            --primary: #A3B18A; 
            --primary-dark: #588157; 
            --secondary: #E9EDC9;
            --text: #344E41;
            --accent: #6D6875;
            --danger: #B5838D;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        * { font-style: normal !important; text-decoration: none !important; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .morandi-card {
            background: white;
            border: 1px solid var(--secondary);
            border-radius: 1.25rem;
            transition: all 0.3s ease;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 1rem;
            border: 1px solid var(--secondary);
            background: white;
        }
        
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { 
            background-color: #F1F3E9; 
            color: var(--text); 
            font-weight: 700; 
            text-align: left; 
            padding: 14px 16px; 
            font-size: 11px; 
            cursor: pointer; 
            user-select: none;
        }
        th:hover { background-color: var(--secondary); }
        td { padding: 14px 16px; border-bottom: 1px solid #F1F3E9; font-size: 12px; }
        
        .search-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .search-icon {
            color: var(--accent);
            flex-shrink: 0;
        }
        .search-input {
            background-color: white;
            padding-left: 16px;
        }

        .tab-active {
            background-color: var(--primary-dark) !important;
            color: white !important;
            box-shadow: 0 4px 10px rgba(88, 129, 87, 0.2);
        }
        .tab-inactive {
            background-color: white !important;
            border: 2px solid var(--primary) !important;
            color: var(--primary-dark) !important;
        }
        
        .project-btn {
            font-size: 11px; 
            padding: 6px 16px;
            border-radius: 999px;
            border: 1px solid var(--secondary);
            background: white;
            color: var(--accent);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .project-btn-active {
            background-color: var(--primary-dark);
            color: white;
            border-color: var(--primary-dark);
        }

        .action-btn {
            padding: 4px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .action-btn:hover { background-color: #f3f4f6; }

        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid white;
            width: 16px; height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white p-10 rounded-[2.5rem] shadow-sm border border-secondary text-center fade-in">
            <h1 class="text-2xl font-bold mb-2 tracking-tight text-[#344E41]">幸福家代銷部獎金管理系統</h1>
            <p class="text-accent mb-10 text-[10px] tracking-[0.4em] uppercase font-light">Secure Bonus Settlement Platform</p>
            <button id="btn-login" class="bg-[#A3B18A] text-white w-full py-4 rounded-2xl flex items-center justify-center gap-3 font-medium shadow-sm hover:opacity-90">
                <i data-lucide="shield-check"></i>
                <div id="login-spinner" class="spinner hidden"></div>
                <span>使用 Google 帳號登入</span>
            </button>
        </div>
    </div>

    <div id="app-screen" class="hidden min-h-screen">
        <nav class="fixed top-0 left-0 right-0 h-16 bg-white/80 backdrop-blur-md border-b border-secondary flex items-center justify-between px-6 z-50">
            <div class="flex items-center gap-2">
                <i data-lucide="bar-chart-3" class="text-primary w-5 h-5"></i>
                <span class="font-bold text-base tracking-tighter uppercase text-[#344E41]">Bonus System</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="user-email" class="hidden md:block text-[10px] text-accent font-medium"></span>
                <button id="btn-logout" class="p-2 hover:bg-gray-100 rounded-full">
                    <i data-lucide="log-out" class="w-5 h-5 text-accent"></i>
                </button>
            </div>
        </nav>

        <main class="pt-24 pb-12 px-4 max-w-7xl mx-auto">
            <div id="admin-nav" class="hidden flex gap-3 mb-8">
                <button onclick="showPage('dashboard')" id="tab-dashboard" class="tab-active px-8 py-2.5 rounded-full text-xs font-bold transition-all">獎金儀表板</button>
                <button onclick="showPage('admin')" id="tab-admin" class="tab-inactive px-8 py-2.5 rounded-full text-xs font-bold transition-all">管理中心</button>
            </div>

            <div id="page-dashboard" class="space-y-8 fade-in">
                <header class="flex flex-col xl:flex-row xl:items-center justify-between gap-6">
                    <div class="flex-shrink-0">
                        <h2 class="text-2xl font-bold">您好，<span id="display-name" class="text-primary">...</span></h2>
                        <p class="text-[10px] text-accent mt-1 tracking-widest uppercase">Performance Dashboard</p>
                        <div class="search-container mt-4 w-full md:w-80">
                            <i data-lucide="search" class="search-icon w-5 h-5"></i>
                            <input type="text" id="keyword-search" placeholder="搜尋金額或戶別..." class="search-input w-full px-4 py-2.5 text-xs bg-white border border-secondary rounded-xl outline-none focus:ring-1 focus:ring-primary shadow-sm" />
                        </div>
                    </div>

                    <div class="flex flex-1 flex-wrap lg:flex-nowrap justify-start xl:justify-end gap-3">
                        <div class="morandi-card p-4 border-l-4 border-l-gray-300 min-w-[150px] flex-1">
                            <div class="text-[10px] text-accent mb-1 font-bold uppercase tracking-widest">應領獎金總額</div>
                            <div class="text-lg font-bold tracking-tighter" id="val-total">NT$ 0</div>
                        </div>
                        <div class="morandi-card p-4 border-l-4 border-l-primary min-w-[150px] flex-1">
                            <div class="text-[10px] text-primary mb-1 font-bold uppercase tracking-widest">已領取累計</div>
                            <div class="text-lg font-bold tracking-tighter text-primary" id="val-received">NT$ 0</div>
                        </div>
                        <div class="morandi-card p-4 border-l-4 border-l-danger min-w-[150px] flex-1">
                            <div class="text-[10px] text-danger mb-1 font-bold uppercase tracking-widest">待領剩餘總額</div>
                            <div class="text-lg font-bold tracking-tighter text-danger" id="val-pending">NT$ 0</div>
                        </div>
                    </div>
                </header>

                <div class="flex flex-wrap items-center gap-4">
                    <p class="text-sm font-bold text-accent uppercase tracking-widest flex items-center gap-2 flex-shrink-0">
                        <i data-lucide="filter" class="w-4 h-4 text-primary"></i> 快速按案場篩選:
                    </p>
                    <div id="project-filters" class="flex flex-wrap gap-2"></div>
                </div>

                <section class="space-y-4">
                    <h3 class="text-sm font-bold flex items-center gap-2">
                        <i data-lucide="table-2" class="w-4 h-4 text-primary"></i> 數據明細清單 (全關鍵字搜尋支援)
                    </h3>
                    <div class="table-container shadow-sm">
                        <table id="details-table">
                            <thead>
                                <tr>
                                    <th onclick="toggleSort('name')">姓名 <span id="sort-name"></span></th>
                                    <th onclick="toggleSort('role')">職位 <span id="sort-role"></span></th>
                                    <th onclick="toggleSort('project')">案場名稱 <span id="sort-project"></span></th>
                                    <th onclick="toggleSort('sales')">總銷/總佣 <span id="sort-sales"></span></th>
                                    <th onclick="toggleSort('percent')">獎金% <span id="sort-percent"></span></th>
                                    <th onclick="toggleSort('expected')">應領(100%) <span id="sort-expected"></span></th>
                                    <th onclick="toggleSort('paid')">已領(合計) <span id="sort-paid"></span></th>
                                    <th onclick="toggleSort('remaining')">待領(剩餘) <span id="sort-remaining"></span></th>
                                    <th onclick="toggleSort('date')">上次發放日期 <span id="sort-date"></span></th>
                                </tr>
                            </thead>
                            <tbody id="details-body"></tbody>
                        </table>
                    </div>
                </section>
            </div>

            <div id="page-admin" class="hidden space-y-8 fade-in">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white p-8 rounded-[2rem] border border-secondary shadow-sm">
                        <h3 class="text-xs font-bold mb-6 flex items-center gap-2">
                            <i data-lucide="cloud-upload" class="w-4 h-4"></i> 1. 上傳並覆蓋雲端數據
                        </h3>
                        <div id="drop-zone" class="border-2 border-dashed border-secondary rounded-2xl p-10 text-center hover:border-primary transition-all relative bg-gray-50/50">
                            <input type="file" id="csv-file" accept=".csv" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                            <div id="upload-status" class="flex flex-col items-center">
                                <i data-lucide="database" class="mx-auto w-8 h-8 text-gray-300 mb-3"></i>
                                <p class="text-[11px] text-accent">拖放 `全部new.csv` 將自動合併並覆蓋舊資料</p>
                            </div>
                        </div>
                        <div id="import-report" class="mt-6 hidden p-4 bg-red-50 rounded-xl border border-red-100">
                            <h4 class="text-[11px] font-bold text-red-600 flex items-center gap-2 mb-2"><i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> 異常報告</h4>
                            <ul id="report-list" class="text-[10px] text-red-500 space-y-1 list-disc list-inside max-h-40 overflow-y-auto no-scrollbar"></ul>
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-[2rem] border border-secondary shadow-sm">
                        <h3 class="text-xs font-bold mb-6 flex items-center gap-2"><i data-lucide="users" class="w-4 h-4"></i> 2. 人員授權管理</h3>
                        <form id="form-auth" class="space-y-3 mb-6">
                            <input type="hidden" id="edit-mapping-id" value="">
                            <div class="flex gap-2">
                                <input id="auth-name" placeholder="姓名" required class="flex-1 px-4 py-2 bg-gray-50 rounded-xl text-xs outline-none focus:ring-1 focus:ring-primary" />
                                <input id="auth-email" type="email" placeholder="Gmail" required class="flex-1 px-4 py-2 bg-gray-50 rounded-xl text-xs outline-none focus:ring-1 focus:ring-primary" />
                            </div>
                            <button type="submit" id="btn-auth-submit" class="w-full py-3 bg-[#588157] text-white rounded-xl text-xs font-bold transition-all">確認新增授權</button>
                            <button type="button" id="btn-auth-cancel" class="hidden w-full py-2 bg-gray-100 text-accent rounded-xl text-[10px] font-bold">取消編輯</button>
                        </form>
                        <div id="auth-list" class="space-y-2 max-h-60 overflow-y-auto no-scrollbar"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, writeBatch, onSnapshot, getDocs, doc, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDREvduzrja4xjF-RCpKa-qv45JZCw9tjI",
            authDomain: "gen-lang-client-0168131217.firebaseapp.com",
            projectId: "gen-lang-client-0168131217",
            storageBucket: "gen-lang-client-0168131217.firebasestorage.app",
            messagingSenderId: "620488371764",
            appId: "1:620488371764:web:77fe6caab7ce0652ab2461"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'qingsenyuan-admin'; 
        const ADMIN_EMAIL = 'jingchuantw@gmail.com';

        let mappingData = {};
        let bonusData = [];
        let currentSort = { key: 'date', asc: false };
        let activeProjectFilter = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email || "測試訪客";
                if (user.email === ADMIN_EMAIL || user.isAnonymous) document.getElementById('admin-nav').classList.remove('hidden');
                startSync();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
            lucide.createIcons();
        });

        document.getElementById('btn-login').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());

        function startSync() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'mappings'), (snap) => {
                mappingData = {};
                const list = document.getElementById('auth-list'); list.innerHTML = '';
                snap.forEach(d => {
                    const data = d.data(); const docId = d.id;
                    mappingData[data.email.toLowerCase().trim()] = data.name.trim();
                    const el = document.createElement('div');
                    el.className = "p-3 bg-gray-50 rounded-xl text-[10px] flex justify-between items-center group";
                    el.innerHTML = `<div class="flex flex-col"><span class="font-bold text-text">${data.name}</span><span class="opacity-50 text-[9px]">${data.email}</span></div><div class="flex gap-1 opacity-0 group-hover:opacity-100"><button onclick="window.editMapping('${docId}', '${data.name}', '${data.email}')" class="action-btn"><i data-lucide="pencil" class="w-3.5 h-3.5 text-primary-dark"></i></button><button onclick="window.deleteMapping('${docId}', '${data.name}')" class="action-btn"><i data-lucide="trash-2" class="w-3.5 h-3.5 text-danger"></i></button></div>`;
                    list.appendChild(el);
                });
                lucide.createIcons(); renderUI();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'bonuses'), (snap) => {
                bonusData = []; snap.forEach(d => bonusData.push(d.data())); renderUI();
            });
        }

        window.deleteMapping = async (id, name) => {
            if (confirm(`確定要刪除「${name}」的授權嗎？`)) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'mappings', id));
        };

        window.editMapping = (id, name, email) => {
            document.getElementById('edit-mapping-id').value = id;
            document.getElementById('auth-name').value = name;
            document.getElementById('auth-email').value = email;
            document.getElementById('btn-auth-submit').innerText = "確認修改授權";
            document.getElementById('btn-auth-cancel').classList.remove('hidden');
        };

        document.getElementById('btn-auth-cancel').onclick = () => {
            document.getElementById('edit-mapping-id').value = "";
            document.getElementById('form-auth').reset();
            document.getElementById('btn-auth-submit').innerText = "確認新增授權";
            document.getElementById('btn-auth-cancel').classList.add('hidden');
        };

        document.getElementById('form-auth').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-mapping-id').value;
            const name = document.getElementById('auth-name').value;
            const email = document.getElementById('auth-email').value;
            if (id) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'mappings', id), { name, email });
            else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'mappings'), { name, email });
            document.getElementById('btn-auth-cancel').click();
        };

        window.toggleSort = (key) => {
            if (currentSort.key === key) currentSort.asc = !currentSort.asc;
            else { currentSort.key = key; currentSort.asc = true; }
            renderUI();
        };

        document.getElementById('keyword-search').oninput = () => renderUI();

        function renderUI() {
            const user = auth.currentUser; if (!user) return;
            const myName = (user.email === ADMIN_EMAIL || user.isAnonymous) ? "管理員" : (mappingData[user.email?.toLowerCase().trim()] || null);
            document.getElementById('display-name').innerText = myName || "未授權人員";
            const keyword = document.getElementById('keyword-search').value.toLowerCase().trim();
            let filtered = (myName === "管理員") ? bonusData : bonusData.filter(b => b.name === myName);
            const projectsSet = new Set();
            bonusData.forEach(b => { const match = b.project.match(/^[\u4e00-\u9fa5]+/); if (match) projectsSet.add(match[0]); });
            updateProjectButtons(Array.from(projectsSet));
            if (activeProjectFilter) filtered = filtered.filter(b => b.project.startsWith(activeProjectFilter));
            
            // 全關鍵字搜尋
            if (keyword) {
                filtered = filtered.filter(b => 
                    b.name.toLowerCase().includes(keyword) || b.role.toLowerCase().includes(keyword) ||
                    b.project.toLowerCase().includes(keyword) || b.expected.toString().includes(keyword) || 
                    b.paid.toString().includes(keyword) || b.remaining.toString().includes(keyword) ||
                    (b.sales && b.sales.toString().includes(keyword)) || (b.date && b.date.includes(keyword))
                );
            }

            filtered.sort((a, b) => {
                let v1 = a[currentSort.key], v2 = b[currentSort.key];
                if (['sales', 'expected', 'paid', 'remaining'].includes(currentSort.key)) return currentSort.asc ? v1 - v2 : v2 - v1;
                return currentSort.asc ? String(v1).localeCompare(String(v2), 'zh-TW') : String(v2).localeCompare(String(v1), 'zh-TW');
            });

            updateSortIcons();
            let tExp = 0, tPaid = 0, tRem = 0;
            const body = document.getElementById('details-body'); body.innerHTML = '';
            filtered.forEach(b => {
                tExp += b.expected; tPaid += b.paid; tRem += b.remaining;
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="font-bold">${b.name}</td><td>${b.role}</td><td class="font-medium text-[11px]">${b.project}</td><td>${b.sales.toLocaleString()}</td><td>${b.percent}</td><td class="font-bold">NT$ ${b.expected.toLocaleString()}</td><td class="text-primary-dark">NT$ ${b.paid.toLocaleString()}</td><td class="text-danger font-bold">NT$ ${b.remaining.toLocaleString()}</td><td class="text-[10px] text-accent font-medium">${b.date}</td>`;
                body.appendChild(tr);
            });
            document.getElementById('val-total').innerText = `NT$ ${tExp.toLocaleString()}`;
            document.getElementById('val-received').innerText = `NT$ ${tPaid.toLocaleString()}`;
            document.getElementById('val-pending').innerText = `NT$ ${tRem.toLocaleString()}`;
            lucide.createIcons();
        }

        function updateProjectButtons(projects) {
            const container = document.getElementById('project-filters'); container.innerHTML = '';
            const createBtn = (label, value) => {
                const btn = document.createElement('button'); btn.innerText = label;
                btn.className = `project-btn ${activeProjectFilter === value ? 'project-btn-active' : ''}`;
                btn.onclick = () => { activeProjectFilter = value; renderUI(); };
                container.appendChild(btn);
            };
            createBtn('全部案場', null);
            projects.forEach(p => createBtn(p, p));
        }

        function updateSortIcons() {
            const keys = ['name', 'role', 'project', 'sales', 'percent', 'expected', 'paid', 'remaining', 'date'];
            keys.forEach(k => {
                const el = document.getElementById(`sort-${k}`); if (!el) return;
                el.innerHTML = currentSort.key === k ? (currentSort.asc ? '▴' : '▾') : '';
                el.className = 'ml-1 text-primary-dark font-bold';
            });
        }

        async function processFile(file) {
            if (!file) return;
            const statusEl = document.getElementById('upload-status');
            const reportEl = document.getElementById('import-report');
            const reportList = document.getElementById('report-list');
            statusEl.innerHTML = `<div class="spinner border-gray-200 border-t-primary w-6 h-6 mb-2"></div><p class="text-[10px] text-primary font-bold">解析並套用 Excel 原始數值中...</p>`;
            reportEl.classList.add('hidden'); reportList.innerHTML = '';

            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    let csvContent = ev.target.result;
                    if (csvContent.charCodeAt(0) === 0xFEFF) csvContent = csvContent.substr(1);
                    const lines = csvContent.split(/\r?\n/);
                    const aggregateMap = new Map();
                    const csvRegex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                    const failedRows = [];

                    for (let i = 3; i < lines.length; i++) {
                        const line = lines[i].trim(); if (!line || line.replace(/,/g, '').trim() === '') continue;
                        const cols = line.split(csvRegex).map(c => c.trim().replace(/^"|"$/g, '').trim());
                        if (cols.length < 10 || !cols[1]) { failedRows.push(`第 ${i+1} 行: 格式不齊全或姓名缺失`); continue; }

                        try {
                            const name = cols[1], role = cols[2], project = cols[9], date = cols[0];
                            const sales = parseFloat(cols[3].replace(/[^0-9.-]+/g, '')) || 0;
                            const percentStr = cols[4];
                            const percentVal = parseFloat(percentStr.replace('%', '')) / 100 || 0;
                            const paid = parseFloat(cols[8].replace(/[^0-9.-]+/g, '')) || 0;

                            // 重要修正：優先讀取 CSV 第 12 欄 (cols[11]) 的應領金額，解決 384 元誤差
                            let expected = 0;
                            if (cols[11]) {
                                expected = Math.round(parseFloat(cols[11].replace(/[^0-9.-]+/g, ''))) || Math.round(sales * percentVal);
                            } else {
                                expected = Math.round(sales * percentVal);
                            }

                            const key = `${name}|${role}|${sales}|${percentStr}|${project}`;
                            if (aggregateMap.has(key)) {
                                const e = aggregateMap.get(key); e.paid += paid; e.remaining = e.expected - e.paid; e.date = date; 
                            } else {
                                aggregateMap.set(key, { date, name, role, sales, percent: percentStr, expected, paid, remaining: expected - paid, project, createdAt: Date.now() });
                            }
                        } catch (parseErr) { failedRows.push(`第 ${i+1} 行: 解析異常 (${parseErr.message})`); }
                    }

                    const oldSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'bonuses'));
                    const deleteBatch = writeBatch(db); oldSnap.forEach(d => deleteBatch.delete(d.ref)); await deleteBatch.commit();
                    const writeBatchInstance = writeBatch(db); 
                    const finalRecords = Array.from(aggregateMap.values());
                    finalRecords.forEach(record => { writeBatchInstance.set(doc(collection(db, 'artifacts', appId, 'public', 'data', 'bonuses')), record); });
                    await writeBatchInstance.commit();
                    
                    if (failedRows.length > 0) {
                        failedRows.forEach(err => { const li = document.createElement('li'); li.innerText = err; reportList.appendChild(li); });
                        reportEl.classList.remove('hidden');
                        alert(`⚠️ 匯入完成！成功: ${finalRecords.length} 筆，失敗: ${failedRows.length} 筆。請檢查異常報告。`);
                    } else { alert(`✅ 數據覆蓋成功！已匯入 ${finalRecords.length} 筆結算紀錄。`); }
                } catch (err) { alert(`匯入失敗：${err.message}`); } finally { resetUploadStatus(); }
            };
            reader.readAsText(file);
        }

        function resetUploadStatus() {
            document.getElementById('upload-status').innerHTML = `<i data-lucide="database" class="mx-auto w-8 h-8 text-gray-300 mb-3"></i><p class="text-[11px] text-accent">點擊選擇檔案或拖放檔案</p>`;
            lucide.createIcons();
        }
        document.getElementById('csv-file').onchange = (e) => processFile(e.target.files[0]);
        window.showPage = (page) => {
            document.getElementById('page-dashboard').classList.toggle('hidden', page !== 'dashboard');
            document.getElementById('page-admin').classList.toggle('hidden', page !== 'admin');
            const tabs = { dashboard: 'tab-dashboard', admin: 'tab-admin' };
            Object.keys(tabs).forEach(k => {
                document.getElementById(tabs[k]).className = (page === k ? 'tab-active px-8 py-2.5 rounded-full text-xs font-bold transition-all' : 'tab-inactive px-8 py-2.5 rounded-full text-xs font-bold transition-all');
            });
        };
    </script>
</body>
</html>
