<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訂單金額統計助手 - 整理優化版</title>
    <script src="https://unpkg.com/lucide@latest"></script>
<style>
/* --- 變數定義 --- */
:root {
--primary-color: #3498db;
--primary-hover: #2980b9;
--success-color: #27ae60;
--success-hover: #219150;
--danger-color: #e74c3c;
--gray-color: #95a5a6;
--gray-hover: #7f8c8d;
--bg-color: #f4f7f9;
--card-bg: #ffffff;
--text-color: #2c3e50;
--border-color: #e0e6ed;
--hint-bg: #e7f3ff;
--hint-border: #b3d7ff;
--hint-text: #0056b3;
}

/* --- 基礎樣式 --- */
body { 
font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
max-width: 488px; 
margin: 20px auto; 
padding: 15px; 
line-height: 1.6; 
background-color: var(--bg-color); 
color: var(--text-color);
}

.container { 
background: var(--card-bg); 
padding: 20px; 
border-radius: 16px; 
box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
}

h2 { 
text-align: center; 
margin-top: 0; 
display: flex; 
align-items: center; 
justify-content: center; 
gap: 10px; 
font-size: 1.4rem;
}
        
        /* 統一圖示大小 */
        .lucide {
            width: 18px;
            height: 18px;
            stroke-width: 2px;
        }

/* --- 提示區域 --- */
.hint { 
background-color: var(--hint-bg); 
border: 1px solid var(--hint-border); 
color: var(--hint-text); 
font-size: 13px; 
padding: 12px 15px; 
border-radius: 8px; 
margin-bottom: 20px; 
}
.hint span { 
display: block; 
position: relative; 
padding-left: 18px; 
}
.hint span::before { 
content: "•"; 
position: absolute; 
left: 0; 
font-weight: bold; 
}

/* --- 模式切換樣式 --- */
.mode-selector {
display: flex;
background: #eee;
padding: 4px;
border-radius: 8px;
margin-bottom: 15px;
font-size: 14px;
}
.mode-selector label {
flex: 1;
text-align: center;
padding: 8px;
cursor: pointer;
border-radius: 6px;
transition: all 0.2s;
}
.mode-selector input { display: none; }
.mode-selector input:checked + span {
background: white;
display: block;
border-radius: 6px;
box-shadow: 0 2px 5px rgba(0,0,0,0.1);
font-weight: bold;
color: var(--primary-color);
}

/* --- 輸入區域 --- */
textarea { 
width: 100%; 
height: 160px; 
padding: 12px; 
border: 2px solid var(--border-color); 
border-radius: 10px; 
font-size: 14px; 
margin-bottom: 15px; 
box-sizing: border-box; 
resize: vertical; 
transition: border-color 0.3s;
}
textarea:focus { 
outline: none; 
border-color: var(--primary-color); 
}

/* --- 按鈕樣式 --- */
.btn-group { 
display: flex; 
flex-wrap: wrap;
gap: 8px; 
margin-bottom: 20px; 
}
button { 
flex: 1; 
min-width: 100px;
padding: 10px 5px; 
border: none; 
border-radius: 8px; 
cursor: pointer; 
font-size: 13px; 
font-weight: bold; 
transition: all 0.3s; 
display: flex;
align-items: center;
justify-content: center;
            gap: 6px;
}
.process-btn { background-color: var(--primary-color); color: white; }
.process-btn:hover { background-color: var(--primary-hover); }
.copy-btn { background-color: var(--success-color); color: white; }
.copy-btn:hover { background-color: var(--success-hover); }
.clear-btn { background-color: var(--gray-color); color: white; }
.clear-btn:hover { background-color: var(--gray-hover); }

/* --- 結果表格 --- */
#resultArea { margin-top: 20px; display: none; animation: fadeIn 0.5s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 重設勾選專用樣式 */
        .table-header-tools {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 8px;
        }
        .reset-check-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 12px;
            cursor: pointer;
            padding: 0;
            min-width: auto;
            text-decoration: underline;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .reset-check-btn:hover {
            color: var(--primary-hover);
            background: none;
        }
        .reset-check-btn .lucide { width: 14px; height: 14px; }

#resultTable { 
width: 100%; 
border-collapse: collapse; 
margin-bottom: 15px; 
background: #fff; 
border-radius: 8px;
overflow: hidden;
font-size: 14px;
table-layout: fixed;
}
#resultTable th { 
background-color: #f8f9fa; 
color: #34495e; 
padding: 12px 8px; 
border-bottom: 2px solid #eee; 
}
#resultTable td { 
padding: 12px 8px; 
border-bottom: 1px solid #f1f1f1; 
color: var(--text-color); 
cursor: grab; 
position: relative; 
vertical-align: middle; 
word-break: break-all;
}

/* 精確控制欄位寬度 */
#resultTable th:nth-child(1), #resultTable td:nth-child(1) { width: 50px; text-align: center; padding: 0; }
#resultTable th:nth-child(2), #resultTable td:nth-child(2) { text-align: left; }
#resultTable th:nth-child(3), #resultTable td:nth-child(3) { width: 50px; text-align: center; }

/* --- 勾選欄位核心修正 --- */
.check-cell { 
    cursor: pointer !important; 
    user-select: none; 
    color: #cbd5e0; 
    transition: color 0.2s; 
    display: flex !important; /* 強制使用 flex */
    align-items: center;      /* 垂直居中 */
    justify-content: center;   /* 水平居中 */
    min-height: 48px;         /* 給予最小高度確保置中空間 */
    height: 100%;
}
.check-cell i, .check-cell svg {
    display: block;
}

.row-checked { color: var(--gray-color) !important; }
.row-checked td { color: var(--gray-color) !important; }
.row-checked .check-cell { color: var(--success-color); }
.row-checked td:nth-child(2) { text-decoration: line-through; }

/* --- 拖放狀態 --- */
.dragging { opacity: 0.4; background-color: #f0f0f0; }
.drop-merge { background-color: #fff3e0 !important; outline: 2px solid #ff9800; z-index: 10; }
.drop-before { border-top: 3px solid var(--primary-color) !important; }
.drop-after { border-bottom: 3px solid var(--primary-color) !important; }

/* --- 統計區塊 --- */
.summary-box { 
background: #fdf9f2; 
border-left: 5px solid #f1c40f; 
padding: 15px; 
border-radius: 8px; 
}
.summary-line { 
display: flex; 
justify-content: space-between; 
font-size: 16px; 
font-weight: bold; 
margin-bottom: 5px;
}
.total-price { color: var(--danger-color); font-size: 20px; }

/* --- 彈窗與訊息 --- */
.modal { 
display: none; 
position: fixed; 
top: 0; left: 0; width: 100%; height: 100%; 
background: rgba(0,0,0,0.6); 
z-index: 2000; 
align-items: center; 
justify-content: center; 
}
.modal-content { 
background: white; 
padding: 25px; 
border-radius: 12px; 
width: 85%;
max-width: 300px; 
text-align: center; 
box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
}
.modal-input { 
width: 80%; 
padding: 10px; 
margin-bottom: 20px; 
border: 2px solid #ddd; 
border-radius: 6px; 
font-size: 18px; 
text-align: center; 
}
.modal-btns { display: flex; gap: 10px; }

.msg-box { 
position: fixed; 
bottom: 30px; 
left: 50%; 
transform: translateX(-50%); 
background: #333; 
color: white; 
padding: 10px 20px; 
border-radius: 50px; 
display: none; 
z-index: 3000; 
font-size: 13px; 
box-shadow: 0 4px 10px rgba(0,0,0,0.2);
white-space: nowrap;
}

.star-mark { 
color: var(--danger-color); 
font-weight: bold; 
margin-left: 4px; 
font-size: 1.1em; 
vertical-align: middle; 
}
</style>
</head>
<body>

<div id="toast" class="msg-box"></div>

<div id="mainModal" class="modal">
<div class="modal-content">
<p id="modalMsg" style="margin-top: 0;">訊息內容</p>
<div id="priceInputArea" style="display: none;">
<p style="font-size: 13px; color: #666;">請確認或修改合併後的單價：</p>
<input type="number" id="customPrice" class="modal-input" placeholder="金額">
</div>
<div class="modal-btns">
<button class="process-btn" id="modalYes">確定合併</button>
<button class="clear-btn" id="modalNo">取消</button>
</div>
</div>
</div>

<div class="container">
    <h2><i data-lucide="clipboard-list"></i> 訂單明細統計助手 <i data-lucide="clipboard-list"></i></h2>

<div class="hint">
<span>格式：姓名-餐點 價格 (支援「元」字)</span>
<span>相同名稱但價格不同時會標註 *</span>
<span><b>拖拉</b>品項可進行 <b>合併</b> 或 <b>排序</b></span>
</div>

<div class="mode-selector">
<label>
<input type="radio" name="calcMode" value="split" checked>
<span>標準模式 (拆分 + 號)</span>
</label>
<label>
<input type="radio" name="calcMode" value="combo">
<span>套餐模式 (保留整行)</span>
</label>
</div>

<textarea id="inputData" placeholder="請輸入訂單，例如：
王小明-排骨飯 100
李大華-排骨飯 120元
張阿三-雞腿飯 110+大冰紅 30元"></textarea>

<div class="btn-group">
        <button class="process-btn" onclick="processOrder()"><i data-lucide="rocket"></i> 開始統計</button>
        <button class="copy-btn" onclick="copyResult()"><i data-lucide="copy"></i> 複製結果</button>
        <button class="clear-btn" onclick="clearContent()"><i data-lucide="trash-2"></i> 清除</button>
</div>

<div id="resultArea">
        <div class="table-header-tools">
            <button class="reset-check-btn" onclick="resetAllChecks()"><i data-lucide="refresh-cw"></i> 重設所有勾選</button>
        </div>
<table id="resultTable">
<thead>
<tr>
    <th><i data-lucide="check-square"></i></th>
    <th>品項與備註</th>
    <th>數量</th>
</tr>
</thead>
<tbody id="resultBody"></tbody>
</table>

<div class="summary-box">
<div class="summary-line">
<span>總份數：</span>
<span id="totalQty">0 份</span>
</div>
<div class="summary-line">
<span>應收總金額：</span>
<span id="totalAmount" class="total-price">$0</span>
</div>
</div>
</div>
</div>

<script>
    function initIcons() {
        lucide.createIcons();
    }
    
let currentSummary = []; 
let dragSrcIdx = null;
let currentDropTargetIdx = null;
let dropAction = null; 

function showMessage(text) {
const toast = document.getElementById('toast');
toast.innerText = text;
toast.style.display = 'block';
setTimeout(() => { toast.style.display = 'none'; }, 2000);
}

function processOrder() {
const input = document.getElementById('inputData').value.trim();
if (!input) return;

const lines = input.split('\n');
const summaryObj = {};
const mode = document.querySelector('input[name="calcMode"]:checked').value;

lines.forEach(line => {
let trimmed = line.trim();
if (!trimmed || !trimmed.includes('-')) return;
if (trimmed.includes('=')) trimmed = trimmed.split('=')[0].trim();
const parts = trimmed.split('-');
const content = parts.slice(1).join('-').trim();
const rawItems = (mode === 'combo') ? [content] : content.split('+');

rawItems.forEach(rawItem => {
const subItem = rawItem.trim();
const match = subItem.match(/^(.*?)(\d+)\s*元?$/);
if (match) {
let detail = match[1].trim(); 
const price = parseInt(match[2], 10);
detail = detail.replace(/([^\s])(無糖|微糖|一分糖|二分糖|三分糖|半糖|少糖|七分糖|去冰|微冰|少冰|多冰|正常|熱)/g, '$1 $2');
detail = detail.replace(/\s+/g, ' ').trim();
const key = `${detail}_${price}`;
if (!summaryObj[key]) {
summaryObj[key] = { name: detail, qty: 0, price: price, isMinor: false, checked: false };
}
summaryObj[key].qty += 1;
}
});
});

currentSummary = Object.values(summaryObj);
checkMinorItems(); 
currentSummary.sort((a, b) => a.name.localeCompare(b.name, 'zh-Hant'));
renderDisplay();
}

function checkMinorItems() {
currentSummary.forEach(item => item.isMinor = false);
const nameGroups = {};
currentSummary.forEach(item => {
const cleanName = item.name.replace(/\s+/g, ''); 
if (!nameGroups[cleanName]) nameGroups[cleanName] = [];
nameGroups[cleanName].push(item);
});
Object.keys(nameGroups).forEach(cleanName => {
const group = nameGroups[cleanName];
if (group.length > 1) {
group.sort((a, b) => (b.qty !== a.qty) ? (b.qty - a.qty) : (a.price - b.price));
for (let i = 1; i < group.length; i++) group[i].isMinor = true;
}
});
}

function renderDisplay() {
const tbody = document.getElementById('resultBody');
tbody.innerHTML = "";
let totalQty = 0;
let totalAmount = 0;

currentSummary.forEach((item, index) => {
const tr = document.createElement('tr');
tr.draggable = true;
tr.dataset.index = index;
if (item.checked) tr.classList.add('row-checked');

const starHtml = item.isMinor ? '<span class="star-mark">*</span>' : '';
const checkIconName = item.checked ? 'check-square' : 'square';

tr.innerHTML = `
    <td><div class="check-cell" onclick="toggleCheck(${index}, event)"><i data-lucide="${checkIconName}"></i></div></td>
    <td>${item.name}${starHtml}</td>
    <td>${item.qty}</td>
`;

tr.addEventListener('dragstart', handleDragStart);
tr.addEventListener('dragover', handleDragOver);
tr.addEventListener('dragleave', handleDragLeave);
tr.addEventListener('drop', handleDrop);
tr.addEventListener('dragend', handleDragEnd);

tbody.appendChild(tr);
totalQty += item.qty;
totalAmount += (item.qty * item.price);
});

document.getElementById('totalQty').innerText = `${totalQty} 份`;
document.getElementById('totalAmount').innerText = `$${totalAmount.toLocaleString()}`;
document.getElementById('resultArea').style.display = 'block';
initIcons();
}

function toggleCheck(index, event) {
event.stopPropagation();
currentSummary[index].checked = !currentSummary[index].checked;
renderDisplay();
}

function resetAllChecks() {
    currentSummary.forEach(item => item.checked = false);
    renderDisplay();
    showMessage("已重設所有勾選狀態");
}

function handleDragStart(e) {
dragSrcIdx = parseInt(this.dataset.index);
this.classList.add('dragging');
e.dataTransfer.effectAllowed = 'move';
}

function handleDragOver(e) {
if (e.preventDefault) e.preventDefault();
const targetIdx = parseInt(this.dataset.index);
if (dragSrcIdx === targetIdx) return false;
const rect = this.getBoundingClientRect();
const relY = e.clientY - rect.top;
const height = rect.height;
this.classList.remove('drop-before', 'drop-after', 'drop-merge');
if (relY < height * 0.3) {
this.classList.add('drop-before');
dropAction = 'before';
} else if (relY > height * 0.7) {
this.classList.add('drop-after');
dropAction = 'after';
} else {
this.classList.add('drop-merge');
dropAction = 'merge';
}
currentDropTargetIdx = targetIdx;
return false;
}

function handleDragLeave() {
this.classList.remove('drop-before', 'drop-after', 'drop-merge');
}

function handleDrop(e) {
if (e.stopPropagation) e.stopPropagation();
const targetIdx = currentDropTargetIdx;
const srcIdx = dragSrcIdx;
if (srcIdx === null || targetIdx === null || srcIdx === targetIdx) return;
if (dropAction === 'merge') {
triggerMerge(srcIdx, targetIdx);
} else {
const item = currentSummary.splice(srcIdx, 1)[0];
let newTarget = targetIdx;
if (dropAction === 'after' && srcIdx < targetIdx) newTarget = targetIdx;
else if (dropAction === 'before' && srcIdx > targetIdx) newTarget = targetIdx;
currentSummary.splice(newTarget, 0, item);
renderDisplay();
}
}

function handleDragEnd() {
this.classList.remove('dragging');
document.querySelectorAll('#resultTable tr').forEach(row => {
row.classList.remove('drop-before', 'drop-after', 'drop-merge');
});
}

function triggerMerge(srcIdx, targetIdx) {
const src = currentSummary[srcIdx];
const target = currentSummary[targetIdx];
const modal = document.getElementById('mainModal');
const modalMsg = document.getElementById('modalMsg');
const priceArea = document.getElementById('priceInputArea');
const priceInput = document.getElementById('customPrice');
priceArea.style.display = 'none';
if (src.price !== target.price) {
modalMsg.innerHTML = `⚠️ 兩品項單價不同！<br><span style="font-size:13px; color:#d93025;">${src.name} ($${src.price})<br>${target.name} ($${target.price})</span><br><br>合併後要使用哪個金額？`;
priceArea.style.display = 'block';
priceInput.value = target.price;
} else {
modalMsg.innerText = `將「${src.name}」合併至「${target.name}」？`;
}
modal.style.display = 'flex';
document.getElementById('modalYes').onclick = function() {
if (src.price !== target.price) target.price = parseInt(priceInput.value) || target.price;
target.qty += src.qty;
currentSummary.splice(srcIdx, 1);
checkMinorItems(); 
modal.style.display = 'none';
renderDisplay();
showMessage("品項已合併");
};
document.getElementById('modalNo').onclick = function() { modal.style.display = 'none'; };
}

function copyResult() {
if (currentSummary.length === 0) return;
let copyText = "【訂單統計結果】\n";
currentSummary.forEach(item => {
const starText = item.isMinor ? "*" : "";
copyText += `${item.name}${starText} * ${item.qty}\n`;
});
copyText += `\n總份數：${document.getElementById('totalQty').innerText}\n`;
copyText += `總金額：${document.getElementById('totalAmount').innerText}`;
const el = document.createElement('textarea');
el.value = copyText;
document.body.appendChild(el); 
el.select();
try {
document.execCommand('copy');
showMessage("統計結果已複製！");
} catch (err) {
showMessage("複製失敗，請手動複製");
}
document.body.removeChild(el);
}

function clearContent() {
document.getElementById('inputData').value = "";
document.getElementById('resultArea').style.display = 'none';
currentSummary = [];
}

window.onload = initIcons;
</script>

</body>
</html>
