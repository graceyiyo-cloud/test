<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>閱讀手帳</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f5f5f0; color: #5b7a5e; font-family: sans-serif; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .tab-active { background-color: #5b7a5e; color: white; }
        .tab-inactive { color: #8e9a8e; }
        input::placeholder { color: #b0bab0; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-10">

    <header class="flex justify-between items-center px-6 pt-4 pb-2">
        <div class="flex items-center gap-2 text-2xl font-bold">
            <i class="fa-solid fa-book-open"></i>
            <h1>閱讀手帳</h1>
        </div>
        <div class="flex items-center gap-2 text-gray-500">
            <i class="fa-regular fa-user"></i>
            <span class="text-sm">graceyiyo</span>
            <i class="fa-solid fa-arrow-right-from-bracket ml-1"></i>
        </div>
    </header>

    <main class="px-5 space-y-4">
        <div class="grid grid-cols-2 gap-4">
            <div class="card p-5 relative overflow-hidden">
                <p class="text-sm text-gray-500">未讀</p>
                <p class="text-4xl font-light mt-1">49</p>
                <i class="fa-solid fa-hourglass-half absolute right-4 bottom-4 text-4xl opacity-10"></i>
            </div>
            <div class="card p-5 relative overflow-hidden bg-[#eff3ef]">
                <p class="text-sm text-gray-500">累計完食</p>
                <p class="text-4xl font-light mt-1">108</p>
                <i class="fa-solid fa-trophy absolute right-4 bottom-4 text-4xl opacity-10"></i>
            </div>
        </div>

        <div class="flex gap-3 overflow-x-auto pb-2 no-scrollbar">
            <div class="card p-4 min-w-[140px] text-center border border-gray-100">
                <p class="text-sm font-bold text-[#5b7a5e] mb-2">2026 年度</p>
                <div class="flex justify-center items-baseline gap-4">
                    <div><span class="text-xl">8</span><p class="text-[10px] text-gray-400">完食</p></div>
                    <div class="border-l h-6 border-gray-200"></div>
                    <div><span class="text-xl text-gray-400">2</span><p class="text-[10px] text-gray-400">棄書</p></div>
                </div>
            </div>
            <div class="card p-4 min-w-[140px] text-center border border-gray-100 opacity-80">
                <p class="text-sm font-bold text-[#5b7a5e] mb-2">2025 年度</p>
                <div class="flex justify-center items-baseline gap-4">
                    <div><span class="text-xl">22</span><p class="text-[10px] text-gray-400">完食</p></div>
                    <div class="border-l h-6 border-gray-200"></div>
                    <div><span class="text-xl text-gray-400">2</span><p class="text-[10px] text-gray-400">棄書</p></div>
                </div>
            </div>
        </div>

        <button class="w-full card py-5 px-6 flex justify-between items-center text-xl font-bold text-[#4a5f4c]">
            <span class="flex items-center gap-2">
                <i class="fa-solid fa-layer-group text-[#5b7a5e]"></i> 紀錄新書
            </span>
            <i class="fa-solid fa-plus"></i>
        </button>

        <div class="space-y-4 pt-2">
            <div class="flex bg-white rounded-full p-1.5 justify-between shadow-sm">
                <button class="px-6 py-1.5 rounded-full tab-active text-sm">全部</button>
                <button class="px-6 py-1.5 rounded-full tab-inactive text-sm">未讀</button>
                <button class="px-6 py-1.5 rounded-full tab-inactive text-sm">已完食</button>
                <button class="px-6 py-1.5 rounded-full tab-inactive text-sm">棄書</button>
            </div>

            <button class="flex items-center gap-1 bg-white px-4 py-1.5 rounded-full border border-gray-200 text-sm text-gray-500 shadow-sm">
                <i class="fa-regular fa-star"></i> 評分
            </button>

            <div class="flex items-center gap-2">
                <div class="relative flex-1">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                    <input id="searchInput" type="text" value="修真" class="w-full bg-white rounded-full py-3 pl-11 pr-10 focus:outline-none shadow-sm" placeholder="搜尋書籍或作者...">
                    <i class="fa-solid fa-xmark absolute right-4 top-1/2 -translate-y-1/2 text-gray-300 cursor-pointer"></i>
                </div>
                <button onclick="copyFilteredList()" class="shrink-0 bg-[#5b7a5e] text-white px-4 py-3 rounded-full text-sm font-medium shadow-sm active:opacity-80 transition-opacity">
                    複製清單
                </button>
            </div>
        </div>
    </main>

    <script>
        // 模擬的資料結構 (實作時應與您的 Data Source 串接)
        const books = [
            { title: "凡人修仙傳", author: "忘語", status: "已完食" },
            { title: "道詭異仙", author: "狐尾的筆", status: "已完食" },
            { title: "大奉打更人", author: "賣報小郎君", status: "未讀" }
        ];

        function copyFilteredList() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            
            // 根據目前搜尋文字篩選 (此處邏輯需對應您實際的篩選 Filter)
            const filtered = books.filter(book => 
                book.title.includes(searchTerm) || book.author.includes(searchTerm)
            );

            if (filtered.length === 0) {
                alert("目前清單沒有符合的書籍");
                return;
            }

            // 格式化文字：書名-作者
            const listText = filtered.map(book => `${book.title}-${book.author}`).join('\n');

            // 執行複製到剪貼簿
            navigator.clipboard.writeText(listText).then(() => {
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = "已複製！";
                setTimeout(() => btn.innerText = originalText, 1500);
            }).catch(err => {
                console.error('無法複製文字: ', err);
            });
        }
    </script>
</body>
</html>
