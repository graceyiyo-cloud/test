<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工程費用計算</title>
    <style>
        :root {
            --bg: #F4F7F6;
            --card: #FFFFFF;
            --primary: #4A5D4E; 
            --accent: #D4A373;
            --text: #2C3E50;
            --label-text: #5D6D7E;
            --border: #D5DBDB;
            --danger: #C0392B;
            --success: #27AE60;
        }

        body { background-color: var(--bg); color: var(--text); font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .page { width: 100%; max-width: 500px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); width: 100%; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); box-sizing: border-box; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }
        
        h2 { text-align: center; color: var(--primary); font-weight: 700; margin-bottom: 25px; letter-spacing: 2px; }
        .row { display: flex; gap: 12px; margin-bottom: 18px; align-items: flex-end; }
        .col { flex: 1; display: flex; flex-direction: column; }
        
        label { font-size: 0.85rem; margin-bottom: 8px; color: var(--label-text); font-weight: 600; }
        .tip { font-weight: normal; font-size: 0.75rem; color: var(--accent); }
        
        input { padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 1rem; outline: none; background: #FFF; width: 100%; box-sizing: border-box; transition: all 0.2s; }
        input:focus { border-color: var(--primary); background: #FDFFFD; }
        
        input[readonly] { background: #F8F9F9; border-color: #EBEDEF; color: #7F8C8D; }

        .reason-input { margin-top: 8px; font-size: 0.85rem; padding: 8px 12px; border-style: dashed; }

        #netAmount { 
            font-size: 1.5rem; 
            font-weight: 800; 
            color: var(--primary); 
            border: 3px solid var(--primary); 
            background: #FFF; 
            text-align: center;
            height: 60px;
            box-shadow: 0 4px 10px rgba(74, 93, 78, 0.1);
        }
        
        .config-box { background: #FDFEFE; padding: 18px; border-radius: 15px; margin: 20px 0; border: 1.5px solid #E5E8E8; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        
        .display-area { background: #F8F9F9; border-radius: 15px; padding: 20px; margin-top: 20px; border: 1px solid #EAEDED; }
        .section-title { font-size: 0.9rem; font-weight: 800; color: var(--primary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; width: 4px; height: 16px; background: var(--primary); border-radius: 2px; }
        
        .formula { font-size: 0.95rem; line-height: 1.8; color: #444; }
        .formula strong { color: #000; font-weight: 700; }
        
        .formula-row { display: grid; grid-template-columns: 1.8em 1fr; margin-bottom: 2px; }
        .formula-sub { padding-left: 1.8em; color: #666; font-size: 0.9rem; margin-bottom: 4px; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-copy { flex: 2; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-copy:active { transform: scale(0.98); opacity: 0.9; }
        .btn-reset { flex: 1; padding: 14px; background: #FFF; color: var(--danger); border: 1.5px solid var(--danger); border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-reset:hover { background: #FFF5F5; }

        .check-label { display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text); font-size: 0.9rem; transition: 0.2s; }
        .check-label input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); }

        .toggle-group { 
            display: flex; 
            background: #EBEDEF; 
            border-radius: 12px; 
            padding: 4px; 
            height: 46px;
            box-sizing: border-box;
        }
        .toggle-group label { flex: 1; margin: 0; cursor: pointer; }
        .toggle-group input { display: none; }
        .toggle-group span { 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            border-radius: 10px;
            color: #7F8C8D;
            font-size: 0.9rem;
            font-weight: 700;
            transition: all 0.3s;
        }
        .toggle-group input:checked + span { 
            background: var(--primary); 
            color: #FFFFFF; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        #calcBaseGroup input:checked + span {
            background: var(--accent);
        }

        /* 新增：反灰不可點選的樣式 */
        .disabled-state {
            opacity: 0.4;
            pointer-events: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div id="calcPage" class="page">
    <div class="card">
        <h2>工程費用計算</h2>
        
        <div class="row">
            <div class="col">
                <label>輸入金額</label>
                <input type="number" id="inputAmount" placeholder="0" oninput="calculate()">
            </div>
            <div class="col">
                <label>金額類型</label>
                <div class="toggle-group">
                    <label>
                        <input type="radio" name="taxType" value="exclude" checked onchange="calculate()">
                        <span>未稅</span>
                    </label>
                    <label>
                        <input type="radio" name="taxType" value="include" onchange="calculate()">
                        <span>含稅</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label>未稅金額</label>
                <input type="number" id="rawAmount" readonly>
            </div>
            <div class="col">
                <label>稅額 (5%)</label>
                <input type="number" id="taxAmount" readonly>
            </div>
        </div>

        <div class="config-box">
            <div class="row">
                <div class="col">
                    <label>計算基準 <span class="tip">(只影響計算過程，不影響最後金額)</span></label>
                    <div class="toggle-group" id="calcBaseGroup">
                        <label>
                            <input type="radio" name="calcBase" value="raw" checked onchange="calculate()">
                            <span>未稅額</span>
                        </label>
                        <label>
                            <input type="radio" name="calcBase" value="total" onchange="calculate()">
                            <span>全額(含稅)</span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <label class="check-label"><input type="checkbox" id="cleanCheck" checked onchange="calculate()"> 清潔保險 (%)</label>
                    <input type="number" id="cleanRate" value="0.5" step="0.1" oninput="calculate()">
                </div>
                <div class="col">
                    <label>清潔保險金額</label>
                    <input type="number" id="cleanAmount" readonly>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <label class="check-label"><input type="checkbox" id="retentionCheck" checked onchange="calculate()"> 保留款 (%)</label>
                    <input type="number" id="retentionRate" value="10" step="1" oninput="calculate()">
                </div>
                <div class="col">
                    <label>保留款金額 (可手修)</label>
                    <input type="number" id="retentionAmount" oninput="calculate(true)">
                </div>
            </div>
            <div class="row" style="margin-bottom: 0;">
                <div class="col">
                    <!-- 新增：加上 ID 以便 JS 控制反灰樣式 -->
                    <label class="check-label" id="invoiceIncludeRetentionLabel">
                        <input type="checkbox" id="invoiceIncludeRetention" onchange="calculate()"> 
                        發票金額含保留款 <span class="tip">(勾選後將分列應付與發票)</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label>加款金額 <span class="tip">(請填含稅)</span></label>
                <input type="number" id="plusAmount" placeholder="0" oninput="calculate()">
                <input type="text" id="plusReason" class="reason-input" placeholder="加款事由..." oninput="calculate()">
            </div>
            <div class="col">
                <label>扣款金額 <span class="tip">(請填含稅)</span></label>
                <input type="number" id="minusAmount" placeholder="0" oninput="calculate()">
                <input type="text" id="minusReason" class="reason-input" placeholder="扣款事由..." oninput="calculate()">
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label>最終淨額 (可手動修改)</label>
                <input type="number" id="netAmount" oninput="updateFormulaOnly()">
            </div>
        </div>

        <div class="display-area">
            <div class="section-title">計算明細</div>
            <div id="processFormula" class="formula">請輸入資料...</div>
        </div>

        <div class="btn-group">
            <button class="btn-copy" onclick="copyResult()">📋 複製計算明細</button>
            <button class="btn-reset" onclick="location.reload()">↺ 重填</button>
        </div>
    </div>
</div>

<script>
    const fmt = new Intl.NumberFormat('zh-TW');
    const circles = ['①', '②', '③', '④', '⑤', '⑥', '⑦', '⑧'];
    let lastCalcState = {};

    function calculate(isManualRetention = false) {
        const inputVal = parseFloat(document.getElementById('inputAmount').value) || 0;
        const taxType = document.querySelector('input[name="taxType"]:checked').value;
        const calcBase = document.querySelector('input[name="calcBase"]:checked').value;
        const plus = parseFloat(document.getElementById('plusAmount').value) || 0;
        const plusReason = document.getElementById('plusReason').value.trim();
        const minus = parseFloat(document.getElementById('minusAmount').value) || 0;
        const minusReason = document.getElementById('minusReason').value.trim();
        
        // 處理保留款勾選狀態與反灰連動
        const hasRetention = document.getElementById('retentionCheck').checked;
        const invoiceRetLabel = document.getElementById('invoiceIncludeRetentionLabel');
        const invoiceRetCheck = document.getElementById('invoiceIncludeRetention');
        
        if (!hasRetention) {
            invoiceRetCheck.disabled = true;
            invoiceRetCheck.checked = false; // 取消保留款時，自動取消「發票含保留款」
            invoiceRetLabel.classList.add('disabled-state');
        } else {
            invoiceRetCheck.disabled = false;
            invoiceRetLabel.classList.remove('disabled-state');
        }
        
        const invoiceIncludeRet = invoiceRetCheck.checked;
        
        let raw = 0, tax = 0, total = 0;

        if (taxType === "exclude") {
            raw = inputVal;
            tax = Math.round(raw * 0.05);
            total = raw + tax;
        } else {
            total = inputVal;
            raw = Math.round(total / 1.05);
            tax = total - raw;
        }

        document.getElementById('rawAmount').value = raw || "";
        document.getElementById('taxAmount').value = tax || "";
        
        const baseAmt = (calcBase === 'total') ? total : raw;

        const hasClean = document.getElementById('cleanCheck').checked;
        const cRate = parseFloat(document.getElementById('cleanRate').value) || 0;
        const cleanFee = hasClean ? Math.round(baseAmt * (cRate / 100)) : 0;
        document.getElementById('cleanAmount').value = cleanFee || "";

        const subtotal = baseAmt - cleanFee;
        
        const rRate = parseFloat(document.getElementById('retentionRate').value) || 0;
        const retentionInput = document.getElementById('retentionAmount');
        let retention = hasRetention ? (isManualRetention ? (parseFloat(retentionInput.value) || 0) : Math.round(subtotal * (rRate / 100))) : 0;
        if(!isManualRetention) retentionInput.value = retention || "";
        
        let net = 0;
        if (calcBase === 'total') {
            net = (subtotal - retention) + plus - minus;
        } else {
            const preTaxRemain = subtotal - retention;
            const recalculatedTax = Math.round(preTaxRemain * 0.05);
            net = preTaxRemain + recalculatedTax + plus - minus;
        }

        lastCalcState = { 
            raw, tax, total, cRate, cleanFee, subtotal, rRate, 
            retention, plus, plusReason, minus, minusReason, 
            invoiceIncludeRet, calcBase, isManualRetention, taxType,
            hasClean, hasRetention
        };
        document.getElementById('netAmount').value = net;
        renderFormula(net);
    }

    function updateFormulaOnly() {
        const manualNet = parseFloat(document.getElementById('netAmount').value) || 0;
        renderFormula(manualNet);
    }

    function renderFormula(currentNet) {
        if (!lastCalcState.raw && lastCalcState.raw !== 0) return;
        if (lastCalcState.raw === 0 && lastCalcState.plus === 0 && lastCalcState.minus === 0) {
            document.getElementById('processFormula').innerHTML = "請輸入資料...";
            return;
        }

        const s = lastCalcState;
        const isRawBase = s.calcBase === 'raw';
        let html = "";
        let stepIdx = 0;

        // ① 基準
        if (isRawBase) {
            html += `<div class="formula-row"><span>${circles[stepIdx++]}</span><span>未稅金額：<strong>${fmt.format(s.raw)}</strong></span></div>`;
        } else {
            html += `<div class="formula-row"><span>${circles[stepIdx++]}</span><span>總金額：${fmt.format(s.raw)} + 稅${fmt.format(s.tax)} = <strong>${fmt.format(s.total)}</strong></span></div>`;
        }

        // ② 清潔費 (僅在勾選時顯示)
        const baseAmt = isRawBase ? s.raw : s.total;
        if (s.hasClean && s.cleanFee !== 0) {
            html += `<div class="formula-row"><span>${circles[stepIdx++]}</span><span>清潔費：${fmt.format(baseAmt)} × ${s.cRate}% = <strong>-${fmt.format(s.cleanFee)}</strong></span></div>`;
            html += `<div class="formula-sub">小計：${fmt.format(baseAmt)} - ${fmt.format(s.cleanFee)} = ${fmt.format(s.subtotal)}</div>`;
        }

        // ③ 保留款 (僅在勾選時顯示)
        if (s.hasRetention && s.retention !== 0) {
            const retCalc = s.isManualRetention ? `(手動調整)` : `× ${s.rRate}%`;
            html += `<div class="formula-row"><span>${circles[stepIdx++]}</span><span>保留款：${fmt.format(s.subtotal)} ${retCalc} = <strong>-${fmt.format(s.retention)}</strong></span></div>`;
            if (isRawBase) {
                const netRaw = s.subtotal - s.retention;
                html += `<div class="formula-sub">淨額：${fmt.format(s.subtotal)} - ${fmt.format(s.retention)} = ${fmt.format(netRaw)}</div>`;
            }
        }

        // 加/扣款項次 (若有)
        if (s.plus !== 0) {
            const reason = s.plusReason ? `(${s.plusReason})` : "";
            html += `<div class="formula-row"><span>${circles[stepIdx++]}</span><span>加款${reason}：<strong>+${fmt.format(s.plus)}</strong></span></div>`;
        }
        if (s.minus !== 0) {
            const reason = s.minusReason ? `(${s.minusReason})` : "";
            html += `<div class="formula-row"><span>${circles[stepIdx++]}</span><span>扣款${reason}：<strong>-${fmt.format(s.minus)}</strong></span></div>`;
        }

        html += `<div style="margin-top:10px; border-top:1.5px solid #EEE; padding-top:10px;">`;

        if (isRawBase) {
            // 未稅基準 總結
            const netRaw = s.subtotal - s.retention;
            const netTax = Math.round(netRaw * 0.05);
            const subtotalTax = Math.round(s.subtotal * 0.05);

            if (s.invoiceIncludeRet && s.hasRetention && s.retention !== 0) {
                const invAmt = (s.subtotal + subtotalTax) + s.plus - s.minus;
                let invPath = `${fmt.format(s.subtotal)} + 稅${fmt.format(subtotalTax)}`;
                if (s.plus !== 0) invPath += ` + 加${fmt.format(s.plus)}`;
                if (s.minus !== 0) invPath += ` - 扣${fmt.format(s.minus)}`;
                html += `<div style="font-size: 0.85rem; color: #666; margin-bottom: 2px;">${invPath} = ${fmt.format(invAmt)}</div>`;
                html += `<div style="font-size: 1rem; color: var(--text);">● 本次發票金額：<strong>${fmt.format(invAmt)}</strong> <span class="tip">(含保留款)</span></div>`;
            }
            
            let payablePath = `${fmt.format(netRaw)} + 稅${fmt.format(netTax)}`;
            if (s.plus !== 0) payablePath += ` + 加${fmt.format(s.plus)}`;
            if (s.minus !== 0) payablePath += ` - 扣${fmt.format(s.minus)}`;
            html += `<div style="font-size: 0.85rem; color: #666; margin-top: 8px; margin-bottom: 2px;">${payablePath} = ${fmt.format(currentNet)}</div>`;
            html += `<div style="font-size: 1rem; color: var(--text);">● 本次應付金額：<strong>${fmt.format(currentNet)}</strong></div>`;

        } else {
            // 含稅基準 總結
            if (s.invoiceIncludeRet && s.hasRetention && s.retention !== 0) {
                const invAmt = s.subtotal + s.plus - s.minus;
                let invPath = `${fmt.format(s.total)}`;
                if (s.hasClean && s.cleanFee !== 0) invPath += ` - ${fmt.format(s.cleanFee)}`;
                if (s.plus !== 0) invPath += ` + 加${fmt.format(s.plus)}`;
                if (s.minus !== 0) invPath += ` - 扣${fmt.format(s.minus)}`;
                html += `<div style="font-size: 0.85rem; color: #666; margin-bottom: 2px;">${invPath} = ${fmt.format(invAmt)}</div>`;
                html += `<div style="font-size: 1rem; color: var(--text);">● 本次發票金額：<strong>${fmt.format(invAmt)}</strong> <span class="tip">(含保留款)</span></div>`;
            }

            let payablePathParts = [];
            payablePathParts.push(fmt.format(s.total));
            if (s.hasClean && s.cleanFee !== 0) payablePathParts.push(`- ${fmt.format(s.cleanFee)}`);
            if (s.hasRetention && s.retention !== 0) payablePathParts.push(`- ${fmt.format(s.retention)}`);
            if (s.plus !== 0) payablePathParts.push(`+ 加${fmt.format(s.plus)}`);
            if (s.minus !== 0) payablePathParts.push(`- 扣${fmt.format(s.minus)}`);
            let payablePath = payablePathParts.join(" ");

            html += `<div style="font-size: 0.85rem; color: #666; margin-top: 8px; margin-bottom: 2px;">${payablePath} = ${fmt.format(currentNet)}</div>`;
            html += `<div style="font-size: 1rem; color: var(--text);">● 本次應付金額：<strong>${fmt.format(currentNet)}</strong></div>`;
        }

        html += `</div>`;
        document.getElementById('processFormula').innerHTML = html;
    }

    function copyResult() {
        const net = parseFloat(document.getElementById('netAmount').value) || 0;
        if (!net && net !== 0) { alert("請先輸入金額"); return; }
        
        const s = lastCalcState;
        const isRawBase = s.calcBase === 'raw';
        let text = `【工程費用計算明細】\n`;
        let stepIdx = 0;

        if (isRawBase) {
            text += `${circles[stepIdx++]} 未稅金額：${fmt.format(s.raw)}\n`;
        } else {
            text += `${circles[stepIdx++]} 總金額：${fmt.format(s.raw)} + 稅${fmt.format(s.tax)} = ${fmt.format(s.total)}\n`;
        }

        const baseAmt = isRawBase ? s.raw : s.total;
        if (s.hasClean && s.cleanFee !== 0) {
            text += `${circles[stepIdx++]} 清潔費：${fmt.format(baseAmt)} × ${s.cRate}% = -${fmt.format(s.cleanFee)}\n`;
            text += `    小計：${fmt.format(baseAmt)} - ${fmt.format(s.cleanFee)} = ${fmt.format(s.subtotal)}\n`;
        }
        
        if (s.hasRetention && s.retention !== 0) {
            const retCalc = s.isManualRetention ? `(手動調整)` : `× ${s.rRate}%`;
            text += `${circles[stepIdx++]} 保留款：${fmt.format(s.subtotal)} ${retCalc} = -${fmt.format(s.retention)}\n`;
            if (isRawBase) {
                text += `    淨額：${fmt.format(s.subtotal)} - ${fmt.format(s.retention)} = ${fmt.format(s.subtotal - s.retention)}\n`;
            }
        }

        if (s.plus !== 0) {
            text += `${circles[stepIdx++]} 加款${s.plusReason ? '('+s.plusReason+')' : ''}：+${fmt.format(s.plus)}\n`;
        }
        if (s.minus !== 0) {
            text += `${circles[stepIdx++]} 扣款${s.minusReason ? '('+s.minusReason+')' : ''}：-${fmt.format(s.minus)}\n`;
        }

        text += `------------------\n`;

        if (isRawBase) {
            const netRaw = s.subtotal - s.retention;
            const netTax = Math.round(netRaw * 0.05);
            const subtotalTax = Math.round(s.subtotal * 0.05);
            
            if (s.invoiceIncludeRet && s.hasRetention && s.retention !== 0) {
                const invAmt = (s.subtotal + subtotalTax) + s.plus - s.minus;
                let invPath = `${fmt.format(s.subtotal)} + 稅${fmt.format(subtotalTax)}`;
                if (s.plus !== 0) invPath += ` + 加${fmt.format(s.plus)}`;
                if (s.minus !== 0) invPath += ` - 扣${fmt.format(s.minus)}`;
                text += `${invPath} = ${fmt.format(invAmt)}\n`;
                text += `● 本次發票金額：${fmt.format(invAmt)} (含保留款)\n\n`;
            }
            
            let payablePath = `${fmt.format(netRaw)} + 稅${fmt.format(netTax)}`;
            if (s.plus !== 0) payablePath += ` + 加${fmt.format(s.plus)}`;
            if (s.minus !== 0) payablePath += ` - 扣${fmt.format(s.minus)}`;
            text += `${payablePath} = ${fmt.format(net)}\n`;
            text += `● 本次應付金額：${fmt.format(net)}`;
        } else {
            if (s.invoiceIncludeRet && s.hasRetention && s.retention !== 0) {
                const invAmt = s.subtotal + s.plus - s.minus;
                let invPath = `${fmt.format(s.total)}`;
                if (s.hasClean && s.cleanFee !== 0) invPath += ` - ${fmt.format(s.cleanFee)}`;
                if (s.plus !== 0) invPath += ` + 加${fmt.format(s.plus)}`;
                if (s.minus !== 0) invPath += ` - 扣${fmt.format(s.minus)}`;
                text += `${invPath} = ${fmt.format(invAmt)}\n`;
                text += `● 本次發票金額：${fmt.format(invAmt)} (含保留款)\n\n`;
            }

            let payablePathParts = [];
            payablePathParts.push(fmt.format(s.total));
            if (s.hasClean && s.cleanFee !== 0) payablePathParts.push(`- ${fmt.format(s.cleanFee)}`);
            if (s.hasRetention && s.retention !== 0) payablePathParts.push(`- ${fmt.format(s.retention)}`);
            if (s.plus !== 0) payablePathParts.push(`+ 加${fmt.format(s.plus)}`);
            if (s.minus !== 0) payablePathParts.push(`- 扣${fmt.format(s.minus)}`);
            let payablePath = payablePathParts.join(" ");

            text += `${payablePath} = ${fmt.format(net)}\n`;
            text += `● 本次應付金額：${fmt.format(net)}`;
        }

        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('.btn-copy');
            const originalText = btn.innerText;
            btn.innerText = "✅ 已複製明細";
            btn.style.background = "#27AE60";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "";
            }, 2000);
        });
    }
    
    // 網頁載入時初始化一次反灰狀態
    window.onload = () => { calculate(); };
</script>

</body>
</html>
