<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訂單金額統計助手 - 整理優化版</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
/* --- 變數定義 --- */
:root {
--primary-color: #3498db;
--primary-hover: #2980b9;
--success-color: #27ae60;
--success-hover: #219150;
--danger-color: #e74c3c;
--gray-color: #95a5a6;
--gray-hover: #7f8c8d;
--bg-color: #f4f7f9;
--card-bg: #ffffff;
--text-color: #2c3e50;
--border-color: #e0e6ed;
--hint-bg: #e7f3ff;
--hint-border: #b3d7ff;
--hint-text: #0056b3;
}

/* --- 基礎樣式 --- */
body { 
font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
max-width: 488px; 
margin: 20px auto; 
padding: 15px; 
line-height: 1.6; 
background-color: var(--bg-color); 
color: var(--text-color);
}

.container { 
background: var(--card-bg); 
padding: 20px; 
border-radius: 16px; 
box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
}

h2 { 
text-align: center; 
margin-top: 0; 
display: flex; 
align-items: center; 
justify-content: center; 
gap: 10px; 
font-size: 1.4rem;
}
        
        .lucide {
            width: 18px;
            height: 18px;
            stroke-width: 2px;
        }

/* --- 提示區域 --- */
.hint { 
background-color: var(--hint-bg); 
border: 1px solid var(--hint-border); 
color: var(--hint-text); 
font-size: 13px; 
padding: 12px 15px; 
border-radius: 8px; 
margin-bottom: 20px; 
}
.hint span { 
display: block; 
position: relative; 
padding-left: 18px; 
}
.hint span::before { 
content: "•"; 
position: absolute; 
left: 0; 
font-weight: bold; 
}

/* --- 模式切換樣式 --- */
.mode-selector {
display: flex;
background: #eee;
padding: 4px;
border-radius: 8px;
margin-bottom: 15px;
font-size: 14px;
}
.mode-selector label {
flex: 1;
text-align: center;
padding: 8px;
cursor: pointer;
border-radius: 6px;
transition: all 0.2s;
}
.mode-selector input { display: none; }
.mode-selector input:checked + span {
background: white;
display: block;
border-radius: 6px;
box-shadow: 0 2px 5px rgba(0,0,0,0.1);
font-weight: bold;
color: var(--primary-color);
}

/* --- 輸入區域 --- */
textarea { 
width: 100%; 
height: 160px; 
padding: 12px; 
border: 2px solid var(--border-color); 
border-radius: 10px; 
font-size: 14px; 
margin-bottom: 15px; 
box-sizing: border-box; 
resize: vertical; 
transition: border-color 0.3s;
}
textarea:focus { 
outline: none; 
border-color: var(--primary-color); 
}

/* --- 按鈕樣式 --- */
.btn-group { 
display: flex; 
flex-wrap: wrap;
gap: 8px; 
margin-bottom: 20px; 
}
button { 
flex: 1; 
min-width: 100px;
padding: 10px 5px; 
border: none; 
border-radius: 8px; 
cursor: pointer; 
font-size: 13px; 
font-weight: bold; 
transition: all 0.3s; 
display: flex;
align-items: center;
justify-content: center;
            gap: 6px;
}
.process-btn { background-color: var(--primary-color); color: white; }
.process-btn:hover { background-color: var(--primary-hover); }
.copy-btn { background-color: var(--success-color); color: white; }
.copy-btn:hover { background-color: var(--success-hover); }
.clear-btn { background-color: var(--gray-color); color: white; }
.clear-btn:hover { background-color: var(--gray-hover); }

/* --- 結果表格 --- */
#resultArea { margin-top: 20px; display: none; animation: fadeIn 0.5s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

#resultTable { 
width: 100%; 
border-collapse: collapse; 
margin-bottom: 15px; 
background: #fff; 
border-radius: 8px;
overflow: hidden;
font-size: 14px;
table-layout: fixed;
}
#resultTable th { 
background-color: #f8f9fa; 
color: #34495e; 
padding: 12px 8px; 
border-bottom: 2px solid #eee; 
}
#resultTable td { 
padding: 12px 8px; 
border-bottom: 1px solid #f1f1f1; 
color: var(--text-color); 
position: relative; 
vertical-align: middle; 
word-break: break-all;
}

#resultTable th:nth-child(1), #resultTable td:nth-child(1) { width: 50px; text-align: center; padding: 0; }
#resultTable th:nth-child(2), #resultTable td:nth-child(2) { text-align: left; }
#resultTable th:nth-child(3), #resultTable td:nth-child(3) { width: 50px; text-align: center; }

.check-cell { 
    cursor: pointer !important; 
    user-select: none; 
    color: #cbd5e0; 
    transition: color 0.2s; 
    display: flex !important;
    align-items: center;
    justify-content: center;
    min-height: 48px;
    height: 100%;
}

.row-checked { color: var(--gray-color) !important; }
.row-checked td { color: var(--gray-color) !important; }
.row-checked .check-cell { color: var(--success-color); }
.row-checked td:nth-child(2) { text-decoration: line-through; }

/* Sortable 樣式 */
.sortable-ghost { opacity: 0.1; background-color: var(--primary-color); }
.sortable-chosen { background-color: #f0f7ff; }

/* --- 統計區塊 --- */
.summary-box { 
background: #fdf9f2; 
border-left: 5px solid #f1c40f; 
padding: 15px; 
border-radius: 8px; 
}
.summary-line { 
display: flex; 
justify-content: space-between; 
font-size: 16px; 
font-weight: bold; 
margin-bottom: 5px;
}
.total-price { color: var(--danger-color); font-size: 20px; }

/* --- 彈窗優化樣式 --- */
.modal { 
display: none; 
position: fixed; 
top: 0; left: 0; width: 100%; height: 100%; 
background: rgba(0,0,0,0.6); 
z-index: 2000; 
align-items: center; 
justify-content: center; 
}
.modal-content { 
background: white; 
padding: 20px; 
border-radius: 16px; 
width: 90%;
max-width: 320px; 
text-align: center; 
box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
}
.merge-visual {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin: 15px 0;
    padding: 15px;
    background: #f8f9fa;
    border-radius: 10px;
    border: 1px dashed #ddd;
}
.merge-item {
    padding: 8px 12px;
    border-radius: 6px;
    width: 100%;
    font-size: 14px;
    box-sizing: border-box;
}
.item-src { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
.item-target { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; font-weight: bold; }
.merge-arrow { color: var(--gray-color); font-size: 20px; }

.modal-input { 
width: 100%; 
padding: 10px; 
margin-top: 10px; 
border: 2px solid var(--primary-color); 
border-radius: 8px; 
font-size: 18px; 
text-align: center; 
box-sizing: border-box;
}
.modal-btns { display: flex; gap: 10px; margin-top: 20px; }

.msg-box { 
position: fixed; 
bottom: 30px; 
left: 50%; 
transform: translateX(-50%); 
background: #333; 
color: white; 
padding: 10px 20px; 
border-radius: 50px; 
display: none; 
z-index: 3000; 
font-size: 13px; 
box-shadow: 0 4px 10px rgba(0,0,0,0.2);
white-space: nowrap;
}

.star-mark { 
color: var(--danger-color); 
font-weight: bold; 
margin-left: 4px; 
font-size: 1.1em; 
vertical-align: middle; 
}
</style>
</head>
<body>

<div id="toast" class="msg-box"></div>

<div id="mainModal" class="modal">
<div class="modal-content">
<h3 style="margin-top: 0; font-size: 1.1rem;">確認合併操作</h3>
<div class="merge-visual" id="mergeVisual">
    <div class="merge-item item-src" id="srcText">品項 A</div>
    <div class="merge-arrow">↓ 併入 ↓</div>
    <div class="merge-item item-target" id="targetText">品項 B</div>
</div>
<div id="priceInputArea" style="display: none; text-align: left;">
<p style="font-size: 13px; color: #d93025; margin-bottom: 5px;">⚠️ 單價不同，合併後單價：</p>
<input type="number" id="customPrice" class="modal-input" placeholder="請輸入金額">
</div>
<div class="modal-btns">
<button class="process-btn" id="modalYes">合併品項</button>
<button class="clear-btn" id="modalNo">僅調順序</button>
</div>
</div>
</div>

<div class="container">
    <h2><i data-lucide="clipboard-list"></i> 訂單明細統計助手 <i data-lucide="clipboard-list"></i></h2>

<div class="hint">
<span><b>長按拖動</b>品項，放在另一個品項上即可 <b>合併</b></span>
</div>

<div class="mode-selector">
<label><input type="radio" name="calcMode" value="split" checked><span>標準模式</span></label>
<label><input type="radio" name="calcMode" value="combo"><span>套餐模式</span></label>
</div>

<textarea id="inputData" placeholder="請輸入訂單內容..."></textarea>

<div class="btn-group">
        <button class="process-btn" onclick="processOrder()"><i data-lucide="rocket"></i> 開始統計</button>
        <button class="copy-btn" onclick="copyResult()"><i data-lucide="copy"></i> 複製結果</button>
        <button class="clear-btn" onclick="clearContent()"><i data-lucide="trash-2"></i> 清除</button>
</div>

<div id="resultArea">
        <div class="table-header-tools">
            <button class="reset-check-btn" onclick="resetAllChecks()"><i data-lucide="refresh-cw"></i> 重設所有勾選</button>
        </div>
<table id="resultTable">
<thead>
<tr><th><i data-lucide="check-square"></i></th><th>品項與備註</th><th>數量</th></tr>
</thead>
<tbody id="resultBody"></tbody>
</table>
<div class="summary-box">
<div class="summary-line"><span>總份數：</span><span id="totalQty">0 份</span></div>
<div class="summary-line"><span>應收總金額：</span><span id="totalAmount" class="total-price">$0</span></div>
</div>
</div>
</div>

<script>
let currentSummary = []; 
let sortableInstance = null;

function initIcons() { lucide.createIcons(); }

function initSortable() {
    const el = document.getElementById('resultBody');
    if (sortableInstance) sortableInstance.destroy();

    sortableInstance = new Sortable(el, {
        animation: 150,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        delay: 200, 
        delayOnTouchOnly: true,
        onEnd: function (evt) {
            const srcIdx = evt.oldIndex;
            const targetIdx = evt.newIndex;
            if (srcIdx === targetIdx) return;
            triggerMerge(srcIdx, targetIdx);
        }
    });
}

function triggerMerge(srcIdx, targetIdx) {
    const src = currentSummary[srcIdx];
    const target = currentSummary[targetIdx];
    const modal = document.getElementById('mainModal');
    const priceArea = document.getElementById('priceInputArea');
    const priceInput = document.getElementById('customPrice');
    
    // 更新視覺化文字
    document.getElementById('srcText').innerText = `${src.name} ($${src.price})`;
    document.getElementById('targetText').innerText = `${target.name} ($${target.price})`;

    priceArea.style.display = 'none';
    if (src.price !== target.price) {
        priceArea.style.display = 'block';
        priceInput.value = target.price;
    }

    modal.style.display = 'flex';

    document.getElementById('modalYes').onclick = function() {
        if (src.price !== target.price) {
            target.price = parseInt(priceInput.value) || target.price;
        }
        target.qty += src.qty;
        currentSummary.splice(srcIdx, 1);
        checkMinorItems(); 
        modal.style.display = 'none';
        renderDisplay();
        showMessage("品項已合併");
    };

    document.getElementById('modalNo').onclick = function() {
        // 僅調整順序：根據移動後的位置更新陣列
        const item = currentSummary.splice(srcIdx, 1)[0];
        currentSummary.splice(targetIdx, 0, item);
        modal.style.display = 'none';
        renderDisplay();
    };
}

function processOrder() {
    const input = document.getElementById('inputData').value.trim();
    if (!input) return;
    const lines = input.split('\n');
    const summaryObj = {};
    const mode = document.querySelector('input[name="calcMode"]:checked').value;
    lines.forEach(line => {
        let trimmed = line.trim();
        if (!trimmed || !trimmed.includes('-')) return;
        if (trimmed.includes('=')) trimmed = trimmed.split('=')[0].trim();
        const parts = trimmed.split('-');
        const content = parts.slice(1).join('-').trim();
        const rawItems = (mode === 'combo') ? [content] : content.split('+');
        rawItems.forEach(rawItem => {
            const subItem = rawItem.trim();
            const match = subItem.match(/^(.*?)(\d+)\s*元?$/);
            if (match) {
                let detail = match[1].trim(); 
                const price = parseInt(match[2], 10);
                detail = detail.replace(/([^\s])(無糖|微糖|一分糖|二分糖|三分糖|半糖|少糖|七分糖|去冰|微冰|少冰|多冰|正常|熱)/g, '$1 $2').replace(/\s+/g, ' ').trim();
                const key = `${detail}_${price}`;
                if (!summaryObj[key]) summaryObj[key] = { name: detail, qty: 0, price: price, isMinor: false, checked: false };
                summaryObj[key].qty += 1;
            }
        });
    });
    currentSummary = Object.values(summaryObj);
    checkMinorItems(); 
    currentSummary.sort((a, b) => a.name.localeCompare(b.name, 'zh-Hant'));
    renderDisplay();
}

function checkMinorItems() {
    currentSummary.forEach(item => item.isMinor = false);
    const nameGroups = {};
    currentSummary.forEach(item => {
        const cleanName = item.name.replace(/\s+/g, ''); 
        if (!nameGroups[cleanName]) nameGroups[cleanName] = [];
        nameGroups[cleanName].push(item);
    });
    Object.keys(nameGroups).forEach(cleanName => {
        const group = nameGroups[cleanName];
        if (group.length > 1) {
            group.sort((a, b) => (b.qty !== a.qty) ? (b.qty - a.qty) : (a.price - b.price));
            for (let i = 1; i < group.length; i++) group[i].isMinor = true;
        }
    });
}

function renderDisplay() {
    const tbody = document.getElementById('resultBody');
    tbody.innerHTML = "";
    let totalQty = 0;
    let totalAmount = 0;
    currentSummary.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.dataset.index = index;
        if (item.checked) tr.classList.add('row-checked');
        const starHtml = item.isMinor ? '<span class="star-mark">*</span>' : '';
        const checkIconName = item.checked ? 'check-square' : 'square';
        tr.innerHTML = `<td><div class="check-cell" onclick="toggleCheck(${index}, event)"><i data-lucide="${checkIconName}"></i></div></td><td>${item.name}${starHtml}</td><td>${item.qty}</td>`;
        tbody.appendChild(tr);
        totalQty += item.qty;
        totalAmount += (item.qty * item.price);
    });
    document.getElementById('totalQty').innerText = `${totalQty} 份`;
    document.getElementById('totalAmount').innerText = `$${totalAmount.toLocaleString()}`;
    document.getElementById('resultArea').style.display = 'block';
    initIcons();
    initSortable();
}

function toggleCheck(index, event) {
    event.stopPropagation();
    currentSummary[index].checked = !currentSummary[index].checked;
    renderDisplay();
}

function resetAllChecks() {
    currentSummary.forEach(item => item.checked = false);
    renderDisplay();
    showMessage("已重設所有勾選狀態");
}

function copyResult() {
    if (currentSummary.length === 0) return;
    let copyText = "【訂單統計結果】\n";
    currentSummary.forEach(item => { copyText += `${item.name}${item.isMinor?"*":""} * ${item.qty}\n`; });
    copyText += `\n總份數：${document.getElementById('totalQty').innerText}\n總金額：${document.getElementById('totalAmount').innerText}`;
    const el = document.createElement('textarea'); el.value = copyText; document.body.appendChild(el); el.select();
    document.execCommand('copy'); document.body.removeChild(el); showMessage("統計結果已複製！");
}

function clearContent() {
    document.getElementById('inputData').value = "";
    document.getElementById('resultArea').style.display = 'none';
    currentSummary = [];
}

window.onload = initIcons;
</script>
</body>
</html>
